# ==============================================================================
# OpenQuatt - Shared Base Config
# ==============================================================================
# Common ESPHome/ESP32 runtime shared by all hardware profiles.
# Hardware-specific pin/board substitutions are provided by profile files.
# ==============================================================================

# ==============================================================================
# PACKAGES
# ==============================================================================
substitutions:
  <<: !include openquatt/topology/oq_topology_duo.yaml
  main_release_manifest_url: "https://github.com/jeroen85/OpenQuatt/releases/latest/download/openquatt-duo-ota.manifest.json"
  dev_release_manifest_url: "https://github.com/jeroen85/OpenQuatt/releases/download/dev-latest/openquatt-duo-ota.manifest.json"
  # Stable OTA channel by default. Dev builds should override both substitutions
  # via `esphome -s release_channel dev -s release_manifest_url ... compile ...`.
  release_manifest_url: "https://github.com/jeroen85/OpenQuatt/releases/latest/download/openquatt-duo-ota.manifest.json"

packages:
  <<: !include openquatt/oq_packages_common.yaml
  <<: !include openquatt/topology/oq_topology_packages_duo.yaml
  oq_dhw_modbus_bridge: !include openquatt/oq_dhw_modbus_bridge.yaml

# ==============================================================================
# ESPHOME CORE
# ==============================================================================
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: ${project_name}
    version: ${project_version}
  min_version: 2026.4.0
  name_add_mac_suffix: false
  includes:
    - ${hp_perf_map_header}
    - ${thermal_request_logic_header}
    - ${heating_curve_logic_header}
    - ${dhw_controller_logic_header}
  platformio_options:
    build_flags:
      # Hard-pinned for Duo entrypoints to prevent accidental topology drift.
      - -DOQ_TOPOLOGY_DUO=1
  on_boot:
    priority: -100
    then:
      - text_sensor.template.publish:
          id: oq_project_version_text
          state: "${project_version}"
      - text_sensor.template.publish:
          id: oq_release_channel_text
          state: "${release_channel}"
      - lambda: |-
          if (id(oq_firmware_update_channel).current_option() == "dev") {
            id(oq_firmware_update).set_source_url("${dev_release_manifest_url}");
          } else {
            id(oq_firmware_update).set_source_url("${main_release_manifest_url}");
          }

# ==============================================================================
# PLATFORM
# ==============================================================================
esp32:
  board: ${esp_board}
  flash_size: ${esp_flash_size}
  variant: ${esp_variant}
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_BT_ENABLED: n
