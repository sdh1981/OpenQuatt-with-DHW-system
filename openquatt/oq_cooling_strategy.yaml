# ==============================================================================
# OpenQuatt - Cooling Strategy
# ==============================================================================
#
# Goal:
#   Own the complete cooling path on top of the cooling safety signals.
#   This layer produces a dynamic supply target, a cooling demand `f`, and the
#   downstream cooling compressor requests.
#
# Scope:
#   - Derive a cooling supply target from dew point safety, the configured floor,
#     and room overshoot
#   - Run a small water-temperature PI(D) loop for cooling only
#   - Publish `oq_cooling_demand_raw` (0..20)
#   - Choose the active cooling owner HP and publish cooling requests
#
# ==============================================================================

globals:
  - id: oq_cooling_demand_raw
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_cooling_pid_integral
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: oq_cooling_pid_last_error_c
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: oq_cooling_last_loop_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: oq_cooling_request_last_loop_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: oq_cooling_request_hp1_level
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_cooling_request_hp2_level
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_cooling_request_owner_hp
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_cooling_owner_hp
    type: int
    restore_value: false
    initial_value: '0'

  # 0=idle, 1=owner_hp1, 2=owner_hp2
  - id: oq_cooling_request_reason_code
    type: int
    restore_value: false
    initial_value: '0'

  # Cooling stop reason diagnostics:
  # 0=running_or_idle_normal, 1=disabled, 2=no_cooling_request, 3=not_permitted,
  # 4=target_invalid, 5=supply_invalid, 6=demand_max_zero, 7=safe_floor_stop,
  # 8=not_in_cm5, 9=no_owner_available
  - id: oq_cooling_stop_reason_code
    type: int
    restore_value: false
    initial_value: '0'

select:
  - platform: template
    id: cooling_emitter_profile
    name: "Cooling emitter profile"
    icon: mdi:radiator
    options:
      - Radiatoren
      - Vloerkoeling
      - Custom
    update_interval: 5s
    entity_category: config
    web_server:
      sorting_group_id: oq_cooling
    lambda: |-
      auto near = [](float a, float b, float eps) -> bool {
        return !isnan(a) && fabsf(a - b) <= eps;
      };
      const float on_d = id(cooling_request_on_delta).state;
      const float off_d = id(cooling_request_off_delta).state;
      const float kp = id(cooling_pid_kp).state;
      const float ki = id(cooling_pid_ki).state;
      if (near(on_d, 0.3f, 0.05f) && near(off_d, 0.2f, 0.05f) &&
          near(kp, 3.8f, 0.2f) && near(ki, 0.18f, 0.03f)) {
        return std::string("Radiatoren");
      }
      if (near(on_d, 0.6f, 0.05f) && near(off_d, 0.3f, 0.05f) &&
          near(kp, 2.0f, 0.2f) && near(ki, 0.08f, 0.03f)) {
        return std::string("Vloerkoeling");
      }
      return std::string("Custom");
    set_action:
      then:
        - lambda: |-
            auto set_number_value = [](auto *num, float value) {
              if (num == nullptr) return;
              auto c = num->make_call();
              c.set_value(value);
              c.perform();
            };

            if (x == "Radiatoren") {
              set_number_value(id(cooling_request_on_delta), 0.3f);
              set_number_value(id(cooling_request_off_delta), 0.2f);
              set_number_value(id(cooling_pid_kp), 3.8f);
              set_number_value(id(cooling_pid_ki), 0.18f);
              set_number_value(id(cooling_pid_kd), 0.00f);
              set_number_value(id(cooling_demand_max_f), 6.0f);
              set_number_value(id(cooling_hp2_assist_level), 2.0f);
              set_number_value(id(cooling_safety_margin), 1.8f);
              set_number_value(id(cooling_min_supply_temp), 12.0f);
            } else if (x == "Vloerkoeling") {
              set_number_value(id(cooling_request_on_delta), 0.6f);
              set_number_value(id(cooling_request_off_delta), 0.3f);
              set_number_value(id(cooling_pid_kp), 2.0f);
              set_number_value(id(cooling_pid_ki), 0.08f);
              set_number_value(id(cooling_pid_kd), 0.00f);
              set_number_value(id(cooling_demand_max_f), 4.0f);
              set_number_value(id(cooling_hp2_assist_level), 0.0f);
              set_number_value(id(cooling_safety_margin), 2.2f);
              set_number_value(id(cooling_min_supply_temp), 18.0f);
            }

