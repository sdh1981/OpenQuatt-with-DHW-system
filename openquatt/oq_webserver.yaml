# ==============================================================================
# OpenQuatt – Webserver Sorting Groups
# ==============================================================================
# Goal:
#   Central layout of web_server groups so all packages use the same UI structure
#   (consistent in HA/diagnostics workflow).
# ==============================================================================
external_components:
  - source:
      type: local
      path: components
    components: [web_server_idf]

web_server:
  port: 80
  version: 3
  css_include: openquatt/web/css/openquatt-app.css
  js_include: openquatt/web/js/openquatt-app.js
  js_url: ""
  sorting_groups:
    - id: oq_setup
      name: "Quick Start"
      sorting_weight: 2
    - id: oq_overview
      name: "Overview"
      sorting_weight: 5
    - id: oq_control
      name: "System Control"
      sorting_weight: 10
    - id: oq_heating_strategy
      name: "Heating Strategy"
      sorting_weight: 20
    - id: oq_heating_curve
      name: "Heating Curve"
      sorting_weight: 25
    - id: oq_power_house
      name: "Power House"
      sorting_weight: 30
    - id: oq_cooling
      name: "Cooling"
      sorting_weight: 35
    - id: oq_sensor_selection
      name: "Sensor Selection"
      sorting_weight: 40
    - id: oq_opentherm
      name: "OpenTherm"
      sorting_weight: 45
    - id: oq_boiler
      name: "Boiler"
      sorting_weight: 50
    - id: oq_cic
      name: "CIC Feed"
      sorting_weight: 55
    - id: oq_ha_inputs
      name: "HA Inputs"
      sorting_weight: 60
    - id: oq_temperatures
      name: "Temperatures"
      sorting_weight: 70
    - id: oq_hydraulics
      name: "Flow & Pump"
      sorting_weight: 80
    - id: oq_tuning_flow
      name: "Flow Tuning"
      sorting_weight: 85
    - id: oq_performance
      name: "Performance"
      sorting_weight: 90
    - id: oq_hp1
      name: "HP1"
      sorting_weight: 100
    - id: oq_hp2
      name: "HP2"
      sorting_weight: 105
    - id: oq_advanced_hp_levels
      name: "Advanced - HP Levels"
      sorting_weight: 110
    - id: oq_system_diagnostics
      name: "System Diagnostics"
      sorting_weight: 180
    - id: oq_hp_diagnostics
      name: "HP Diagnostics"
      sorting_weight: 190
    - id: oq_raw
      name: "RAW"
      sorting_weight: 999
