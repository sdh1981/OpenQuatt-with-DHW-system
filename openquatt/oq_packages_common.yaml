    supervisory_secondary_defrost_id: "${secondary_hp_id}_defrost"
    supervisory_secondary_low_noise_mode_id: "${secondary_hp_id}_low_noise_mode"
    supervisory_secondary_set_pump_mode_id: "${secondary_hp_id}_set_pump_mode"
