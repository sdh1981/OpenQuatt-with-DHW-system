    modbus_controller_id: ${hp_id}
    id: ${hp_id}_pump_speed
    name: "${prefix}Set Pump Speed"
    icon: "mdi:speedometer"
    register_type: holding
    address: 2015
    value_type: U_WORD
    min_value: 0
    max_value: 1000
    mode: slider
    skip_updates: ${oq_skip_10s}
    web_server:
      sorting_group_id: oq_${hp_id}

