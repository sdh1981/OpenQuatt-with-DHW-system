  # Derived from the raw 2119 status word; this one remains a standalone binary
  # sensor because it is used by the heating strategies.
  - platform: template
    id: ${hp_id}_prot_oil_return
    name: "${prefix}Protection - Compressor oil return"
    icon: mdi:alert-circle-outline
    device_class: problem
    disabled_by_default: true
    entity_category: diagnostic
    lambda: |-
      const float raw = id(${hp_id}_status_2119_raw).state;
      if (isnan(raw)) {
        return false;
      }
      return (static_cast<uint16_t>(lroundf(raw)) & 0x0008u) != 0;
    web_server:
      sorting_group_id: oq_hp_diagnostics

  - platform: template
    id: ${hp_id}_ot_fault_active
    name: "${prefix}OT fault active"
    internal: true
    device_class: problem
    lambda: |-
      // OT fault should only reflect explicit failure bits, not protection or cycle states.
      auto has_bit = [](float raw, uint16_t bitmask) -> bool {
        return !isnan(raw) && ((static_cast<uint16_t>(lroundf(raw)) & bitmask) != 0);
      };

      const float status_2120 = id(${hp_id}_status_2120_raw).state;
      const float status_2121 = id(${hp_id}_status_2121_raw).state;

      return
          has_bit(status_2120, 0x0001u) ||
          has_bit(status_2120, 0x0002u) ||
          has_bit(status_2120, 0x0004u) ||
          has_bit(status_2120, 0x0008u) ||
          has_bit(status_2120, 0x0010u) ||
          has_bit(status_2120, 0x0020u) ||
          has_bit(status_2120, 0x0040u) ||
          has_bit(status_2120, 0x0080u) ||
          has_bit(status_2120, 0x0100u) ||
          has_bit(status_2120, 0x0400u) ||
          has_bit(status_2120, 0x0800u) ||
          has_bit(status_2120, 0x2000u) ||
          has_bit(status_2120, 0x4000u) ||
          has_bit(status_2120, 0x8000u) ||
          has_bit(status_2121, 0x0001u) ||
          has_bit(status_2121, 0x0002u) ||
          has_bit(status_2121, 0x0004u) ||
          has_bit(status_2121, 0x0008u) ||
          has_bit(status_2121, 0x0010u) ||
          has_bit(status_2121, 0x0020u) ||
          has_bit(status_2121, 0x0040u) ||
          has_bit(status_2121, 0x0080u) ||
          has_bit(status_2121, 0x0100u) ||
          has_bit(status_2121, 0x0200u) ||
          has_bit(status_2121, 0x0400u) ||
          has_bit(status_2121, 0x0800u) ||
          has_bit(status_2121, 0x1000u) ||
          has_bit(status_2121, 0x2000u);

  # ----------------------------
  # TEXT SENSOR
  # ----------------------------
text_sensor:
  - platform: template
    id: ${hp_id}_working_mode_label
    name: "${prefix}Working Mode Label"
    icon: mdi:state-machine
    update_interval: 10s
    web_server:
      sorting_group_id: oq_${hp_id}
    lambda: |-
      // Map the raw numeric Modbus mode to a dashboard-friendly label.
      const float working_mode_raw = id(${hp_id}_working_mode).state;
      if (isnan(working_mode_raw)) {
        return std::string("Unknown");
      }

      const int working_mode = static_cast<int>(roundf(working_mode_raw));
      switch (working_mode) {
        case 0:
          return std::string("Standby");
        case 1:
          return std::string("Cooling");
        case 2:
          return std::string("Heating");
        default: {
          char buf[24];
          snprintf(buf, sizeof(buf), "Unknown (%d)", working_mode);
          return std::string(buf);
        }
      }

  - platform: template
    id: ${hp_id}_excluded_levels_summary
    name: "${prefix}Excluded compressor levels"
    icon: mdi:speedometer-slow
    update_interval: 10s
    web_server:
      sorting_group_id: oq_advanced_hp_levels
      sorting_weight: 43
    lambda: |-
      // Summarize the two exclusion selectors into one compact diagnostic label.
      const std::string a = id(${hp_id}_excluded_level_a).has_state()
                                ? id(${hp_id}_excluded_level_a).current_option()
                                : std::string("None");
      const std::string b = id(${hp_id}_excluded_level_b).has_state()
                                ? id(${hp_id}_excluded_level_b).current_option()
                                : std::string("None");

      if (a == "None" && b == "None") {
        return std::string("None");
      }
      if (a == "None") {
        return b;
      }
      if (b == "None" || a == b) {
        return a;
      }
      return a + ", " + b;

  - platform: template
    id: ${hp_id}_active_failures_list
    name: "${prefix}Active Failures List"
    entity_category: diagnostic
    update_interval: 5s
    web_server:
      sorting_group_id: oq_hp_diagnostics
    icon: mdi:alert-circle-outline
    lambda: |-
      std::string s;
      s.reserve(384);

      auto add = [&](const char *name) -> void {
        if (!s.empty()) s += ", ";
        s += name;
      };

      auto has_bit = [](float raw, uint16_t bitmask) -> bool {
        return !isnan(raw) && ((static_cast<uint16_t>(lroundf(raw)) & bitmask) != 0);
      };

      const float status_2119 = id(${hp_id}_status_2119_raw).state;
      const float status_2120 = id(${hp_id}_status_2120_raw).state;
      const float status_2121 = id(${hp_id}_status_2121_raw).state;

      // 2119
      if (has_bit(status_2119, 0x0001u)) add("Main line current");
      if (has_bit(status_2119, 0x0002u)) add("Compressor phase current");
      if (has_bit(status_2119, 0x0004u)) add("IPM module");
      if (has_bit(status_2119, 0x0008u)) add("Compressor oil return");
      if (has_bit(status_2119, 0x0010u)) add("High pressure switch");
      if (has_bit(status_2119, 0x0020u)) add("High pressure detected");
      if (has_bit(status_2119, 0x0040u)) add("1st start pre-heat");
      if (has_bit(status_2119, 0x0080u)) add("Gas discharge temp sensor");
      if (has_bit(status_2119, 0x0100u)) add("Evaporator temp sensor");
      if (has_bit(status_2119, 0x0200u)) add("AC high-low voltage");
      if (has_bit(status_2119, 0x0400u)) add("Ambient temperature");
      if (has_bit(status_2119, 0x0800u)) add("Frequency limit ambient");
      if (has_bit(status_2119, 0x1000u)) add("Low pressure switch");
      if (has_bit(status_2119, 0x2000u)) add("Low pressure detected");

      // 2120
      if (has_bit(status_2120, 0x0001u)) add("Outdoor ambient temp sensor failure");
      if (has_bit(status_2120, 0x0002u)) add("Outdoor evaporator temp sensor failure");
      if (has_bit(status_2120, 0x0004u)) add("Gas discharge temp sensor failure");
      if (has_bit(status_2120, 0x0008u)) add("Gas return temp sensor failure");
      if (has_bit(status_2120, 0x0010u)) add("Evaporator pressure sensor failure");
      if (has_bit(status_2120, 0x0020u)) add("Condenser pressure sensor failure");
      if (has_bit(status_2120, 0x0040u)) add("High pressure lock");
      if (has_bit(status_2120, 0x0080u)) add("Low pressure lock");
      if (has_bit(status_2120, 0x0100u)) add("DC fan A failure");
      if (has_bit(status_2120, 0x0400u)) add("Evaporating pressure lock");
      if (has_bit(status_2120, 0x0800u)) add("Condenser pressure lock");
      if (has_bit(status_2120, 0x2000u)) add("EVI pressure sensor failure");
      if (has_bit(status_2120, 0x4000u)) add("EVI inlet temp sensor failure");
      if (has_bit(status_2120, 0x8000u)) add("EVI outlet temp sensor failure");

      // 2121
      if (has_bit(status_2121, 0x0001u)) add("Master/slave comm failure");
      if (has_bit(status_2121, 0x0002u)) add("PCB/module comm failure");
      if (has_bit(status_2121, 0x0004u)) add("Compressor phase open/short");
      if (has_bit(status_2121, 0x0008u)) add("Compressor phase overload");
      if (has_bit(status_2121, 0x0010u)) add("Compressor driver failure");
      if (has_bit(status_2121, 0x0020u)) add("Module VDC over/under voltage");
      if (has_bit(status_2121, 0x0040u)) add("AC current failure");
      if (has_bit(status_2121, 0x0080u)) add("EEPROM failure");
      if (has_bit(status_2121, 0x0100u)) add("Fan drive PCB failure");
      if (has_bit(status_2121, 0x0200u)) add("Inlet water temp sensor failure");
      if (has_bit(status_2121, 0x0400u)) add("Outlet water temp sensor failure");
      if (has_bit(status_2121, 0x0800u)) add("Inner coil temp sensor failure");
      if (has_bit(status_2121, 0x1000u)) add("Reserved temp sensor failure");
      if (has_bit(status_2121, 0x2000u)) add("DC water pump failure");

      return s.empty() ? std::string("None") : s;


  - platform: template
    id: ${hp_id}_pcb_firmware_version
    name: "${prefix}ODU PCB firmware version"
    icon: mdi:chip
    entity_category: diagnostic
    disabled_by_default: true
    lambda: |-
      if (!id(${hp_id}_pcb_firmware_raw).has_state()) {
        return {};
      }

      const uint16_t firmware_raw = static_cast<uint16_t>(id(${hp_id}_pcb_firmware_raw).state);
      const uint8_t major = static_cast<uint8_t>((firmware_raw >> 8) & 0xFF);
      const uint8_t minor = static_cast<uint8_t>(firmware_raw & 0xFF);

      char buf[8];
      snprintf(buf, sizeof(buf), "%u.%u", major, minor);
      return std::string(buf);
    update_interval: never
    web_server:
      sorting_group_id: oq_hp_diagnostics
