# ==============================================================================
# OpenQuatt - Energy Aggregation
# ==============================================================================
# Purpose:
# - Centralize HeatPump / Boiler / System energy and COP metrics.
# - Keep control packages focused on control logic.
# ==============================================================================

button:
  - platform: template
    id: oq_reset_cumulative_energy_counters
    name: "Reset Cumulative Energy Counters"
    icon: mdi:restart
    web_server:
      sorting_group_id: oq_performance
    on_press:
      - lambda: |-
          id(oq_electrical_energy_cumulative).reset();
          id(oq_heating_electrical_energy_cumulative).reset();
          id(oq_cooling_electrical_energy_cumulative).reset();
          id(oq_heatpump_thermal_energy_cumulative).reset();
          id(oq_heatpump_cooling_energy_cumulative).reset();
          id(oq_boiler_thermal_energy_cumulative).reset();
          id(oq_system_thermal_energy_cumulative).reset();
          ESP_LOGW("quatt", "Cumulative energy counters reset.");

sensor:
  # Electrical input energy (daily, kWh).
  - platform: total_daily_energy
    id: oq_electrical_energy_daily
    name: "Electrical Energy Daily"
    power_id: oq_total_power_input
    time_id: oq_time
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.001
    restore: true
    web_server:
      sorting_group_id: oq_performance

  # Heating electrical input energy (daily, kWh). Keeps COP heating-only when cooling is active.
  - platform: total_daily_energy
    id: oq_heating_electrical_energy_daily
    name: "Heating Electrical Energy Daily"
    power_id: oq_heating_power_input
    time_id: oq_time
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.001
    restore: true
    web_server:
      sorting_group_id: oq_performance

  # Cooling electrical input energy (daily, kWh). Used for cooling-only EER.
  - platform: total_daily_energy
    id: oq_cooling_electrical_energy_daily
    name: "Cooling Electrical Energy Daily"
    power_id: oq_cooling_power_input
    time_id: oq_time
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.001
    restore: true
    web_server:
      sorting_group_id: oq_performance

  # Electrical input energy (cumulative, kWh).
  - platform: integration
    id: oq_electrical_energy_cumulative
    name: "Electrical Energy Cumulative"
    sensor: oq_total_power_input
    time_unit: h
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.001
    restore: true
    web_server:
      sorting_group_id: oq_performance

  # Heating electrical input energy (cumulative, kWh).
  - platform: integration
    id: oq_heating_electrical_energy_cumulative
    name: "Heating Electrical Energy Cumulative"
    sensor: oq_heating_power_input
    time_unit: h
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.001
    restore: true
    web_server:
      sorting_group_id: oq_performance

  # Cooling electrical input energy (cumulative, kWh).
  - platform: integration
    id: oq_cooling_electrical_energy_cumulative
    name: "Cooling Electrical Energy Cumulative"
    sensor: oq_cooling_power_input
    time_unit: h
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.001
    restore: true
    web_server:
      sorting_group_id: oq_performance

  # Thermal power including HP + boiler contribution (W).
  - platform: template
    id: oq_system_heat_power
    name: "System Heat Power"
    icon: mdi:fire
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 10s
    web_server:
      sorting_group_id: oq_performance
    lambda: |-
      auto nz = [](float value) -> float { return isnan(value) ? 0.0f : value; };
      const float hp_heat_w = nz(id(oq_total_heat_power).state);
      const float boiler_w = nz(id(boiler_heat_power).state);
      return hp_heat_w + boiler_w;

  # HeatPump COP based on daily thermal/electrical energy (kWh/kWh).
  - platform: template
    id: oq_heatpump_cop_daily
    name: "HeatPump COP Daily"
    icon: mdi:chart-bell-curve-cumulative
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    web_server:
      sorting_group_id: oq_performance
    lambda: |-
      const float heat_kwh = id(oq_heatpump_thermal_energy_daily).state;
      const float elec_kwh = id(oq_heating_electrical_energy_daily).state;

      if (isnan(heat_kwh) || isnan(elec_kwh)) return NAN;
      if (elec_kwh < 0.01f) return NAN;

      return heat_kwh / elec_kwh;

  # HeatPump thermal energy (daily, kWh).
  - platform: total_daily_energy
    id: oq_heatpump_thermal_energy_daily
    name: "HeatPump Thermal Energy Daily"
    power_id: oq_total_heat_power
    time_id: oq_time
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.001
    restore: true
    web_server:
      sorting_group_id: oq_performance

  # HeatPump thermal energy (cumulative, kWh).
  - platform: integration
    id: oq_heatpump_thermal_energy_cumulative
    name: "HeatPump Thermal Energy Cumulative"
    sensor: oq_total_heat_power
    time_unit: h
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.001
    restore: true
    web_server:
      sorting_group_id: oq_performance

  # HeatPump cooling energy (daily, kWh).
  - platform: total_daily_energy
    id: oq_heatpump_cooling_energy_daily
    name: "HeatPump Cooling Energy Daily"
    power_id: oq_total_cooling_power
    time_id: oq_time
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.001
    restore: true
    web_server:
      sorting_group_id: oq_performance

  # HeatPump cooling energy (cumulative, kWh).
  - platform: integration
    id: oq_heatpump_cooling_energy_cumulative
    name: "HeatPump Cooling Energy Cumulative"
    sensor: oq_total_cooling_power
    time_unit: h
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.001
    restore: true
    web_server:
      sorting_group_id: oq_performance

  # HeatPump COP based on cumulative thermal/electrical energy (kWh/kWh).
  - platform: template
    id: oq_heatpump_cop_cumulative
    name: "HeatPump COP Cumulative"
    icon: mdi:chart-bell-curve-cumulative
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    web_server:
      sorting_group_id: oq_performance
    lambda: |-
      const float heat_kwh = id(oq_heatpump_thermal_energy_cumulative).state;
      const float elec_kwh = id(oq_heating_electrical_energy_cumulative).state;

      if (isnan(heat_kwh) || isnan(elec_kwh)) return NAN;
      if (elec_kwh < 0.01f) return NAN;

      return heat_kwh / elec_kwh;

  # HeatPump EER based on daily cooling/electrical energy (kWh/kWh).
  - platform: template
    id: oq_heatpump_eer_daily
    name: "HeatPump EER Daily"
    icon: mdi:chart-bell-curve-cumulative
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    web_server:
      sorting_group_id: oq_performance
    lambda: |-
      const float cooling_kwh = id(oq_heatpump_cooling_energy_daily).state;
      const float elec_kwh = id(oq_cooling_electrical_energy_daily).state;

      if (isnan(cooling_kwh) || isnan(elec_kwh)) return NAN;
      if (elec_kwh < 0.01f) return NAN;

      return cooling_kwh / elec_kwh;

  # HeatPump EER based on cumulative cooling/electrical energy (kWh/kWh).
  - platform: template
    id: oq_heatpump_eer_cumulative
    name: "HeatPump EER Cumulative"
    icon: mdi:chart-bell-curve-cumulative
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    web_server:
      sorting_group_id: oq_performance
    lambda: |-
      const float cooling_kwh = id(oq_heatpump_cooling_energy_cumulative).state;
      const float elec_kwh = id(oq_cooling_electrical_energy_cumulative).state;

      if (isnan(cooling_kwh) || isnan(elec_kwh)) return NAN;
      if (elec_kwh < 0.01f) return NAN;

      return cooling_kwh / elec_kwh;

  # Boiler thermal energy (daily, kWh).
  - platform: total_daily_energy
    id: oq_boiler_thermal_energy_daily
    name: "Boiler Thermal Energy Daily"
    power_id: boiler_heat_power
    time_id: oq_time
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.001
    restore: true
    web_server:
      sorting_group_id: oq_boiler

  # Boiler thermal energy (cumulative, kWh).
  - platform: integration
    id: oq_boiler_thermal_energy_cumulative
    name: "Boiler Thermal Energy Cumulative"
    sensor: boiler_heat_power
    time_unit: h
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.001
    restore: true
    web_server:
      sorting_group_id: oq_boiler

  # System thermal energy (daily, kWh): HeatPump + Boiler.
  - platform: total_daily_energy
    id: oq_system_thermal_energy_daily
    name: "System Thermal Energy Daily"
    power_id: oq_system_heat_power
    time_id: oq_time
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.001
    restore: true
    web_server:
      sorting_group_id: oq_performance

  # System thermal energy (cumulative, kWh): HeatPump + Boiler.
  - platform: integration
    id: oq_system_thermal_energy_cumulative
    name: "System Thermal Energy Cumulative"
    sensor: oq_system_heat_power
    time_unit: h
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.001
    restore: true
    web_server:
      sorting_group_id: oq_performance
