# ==============================================================================
# OpenQuatt - CIC / External JSON Data
# ==============================================================================
#
# Goal:
#   Reads and exposes external heat-demand data (for example CIC feed) as input to the internal demand chain.
#
# Role in architecture:
#   Input-adapter layer: maps external data to internal temperature/flow/OT signals.
#
# Notes:
#   - Uses the custom `openquatt_cic` component to keep HTTP/JSON handling off the generic
#     ESPHome `http_request` response-capture path.
#   - Outside-temperature fields from CIC are intentionally omitted; they are not used
#     in the current control chain.
#
# ==============================================================================

external_components:
  - source:
      type: local
      path: components
    components: [openquatt_cic]

# ----------------------------
# CONTROL INPUTS
# ----------------------------
switch:
  - platform: template
    id: cic_enable
    name: "CIC - Enable polling"
    icon: mdi:cloud-sync
    optimistic: true
    restore_mode: ${oq_cic_restore_mode_default}
    web_server:
      sorting_group_id: oq_cic

# ----------------------------
# FEED CONFIG
# ----------------------------
text:
  - platform: template
    id: cic_feed_url
    name: "CIC - Feed URL"
    icon: mdi:link-variant
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "http://192.168.2.117:8080/beta/feed/data.json"
    web_server:
      sorting_group_id: oq_cic

# ----------------------------
# TELEMETRY
# ----------------------------
sensor:
  - platform: template
    id: water_supply_temp_cic
    name: "CIC - Water Supply Temp"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    icon: mdi:water-thermometer
    update_interval: never
    web_server:
      sorting_group_id: oq_temperatures

  - platform: template
    id: cic_control_setpoint
    name: "CIC - Control setpoint"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:thermostat
    update_interval: never
    web_server:
      sorting_group_id: oq_cic

  - platform: template
    id: cic_room_setpoint
    name: "CIC - Room setpoint"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:home-thermometer
    update_interval: never
    web_server:
      sorting_group_id: oq_cic

  - platform: template
    id: cic_room_temp
    name: "CIC - Room temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 3
    icon: mdi:thermometer
    update_interval: never
    web_server:
      sorting_group_id: oq_cic

  - platform: template
    id: flow_rate_cic
    name: "CIC - Flowrate (filtered)"
    unit_of_measurement: "L/h"
    device_class: volume_flow_rate
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:water-pump
    update_interval: never
    web_server:
      sorting_group_id: oq_cic

  - platform: template
    id: cic_backoff_s
    name: "CIC - Polling interval"
    unit_of_measurement: "s"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:timer-sand
    disabled_by_default: true
    update_interval: never
    web_server:
      sorting_group_id: oq_cic

  - platform: template
    id: cic_last_success_age_s
    name: "CIC - Last success age"
    unit_of_measurement: "s"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0
    disabled_by_default: true
    icon: mdi:timeline-clock-outline
    update_interval: never
    web_server:
      sorting_group_id: oq_cic

binary_sensor:
  - platform: template
    id: cic_ch_enabled
    name: "CIC - CH enabled"
    icon: mdi:radiator
    device_class: heat
    web_server:
      sorting_group_id: oq_cic

  - platform: template
    id: cic_cooling_enabled
    name: "CIC - Cooling enabled"
    icon: mdi:snowflake
    device_class: cold
    web_server:
      sorting_group_id: oq_cic

  - platform: template
    id: feed_ok
    name: "CIC - JSON Feed OK"
    icon: mdi:cloud-check
    device_class: connectivity
    web_server:
      sorting_group_id: oq_cic

  - platform: template
    id: cic_data_stale
    name: "CIC - Data stale"
    icon: mdi:cloud-alert
    device_class: problem
    web_server:
      sorting_group_id: oq_cic

# ----------------------------
# CUSTOM CIC FETCHER
# ----------------------------
openquatt_cic:
  id: cic_component
  update_interval: ${cic_poll_tick_ms}ms
  enabled_switch: cic_enable
  url_text: cic_feed_url
  backoff_start_ms: ${cic_backoff_start_ms}
  backoff_max_ms: ${cic_backoff_max_ms}
  min_url_len: ${cic_min_url_len}
  stale_after_ms: ${cic_stale_after_ms}
  feed_error_trip_n: ${cic_feed_error_trip_n}
  timeout_ms: 2000
  response_buffer_size: 2048
  water_supply_temp: water_supply_temp_cic
  flow_rate: flow_rate_cic
  cic_control_setpoint: cic_control_setpoint
  cic_room_setpoint: cic_room_setpoint
  cic_room_temp: cic_room_temp
  cic_ch_enabled: cic_ch_enabled
  cic_cooling_enabled: cic_cooling_enabled
  feed_ok: feed_ok
  data_stale: cic_data_stale
  backoff_sensor: cic_backoff_s
  last_success_age_sensor: cic_last_success_age_s
