# ==============================================================================
# OpenQuatt - Common Substitutions
# ==============================================================================
#
# Single source of truth for all substitution defaults used across packages.
# Keep keys stable and grouped by concern to avoid drift.
#
# ==============================================================================

# ----------------------------
# CORE PROJECT
# ----------------------------
device_name: "openquatt"                              # Internal ESPHome device ID / hostname base.
friendly_name: OpenQuatt                              # Display name in Home Assistant / UI.
project_name: "openquatt.openquatt"                   # ESPHome project identifier shown in firmware metadata.
project_version: "v0.29.0"                            # ESPHome project version shown in firmware metadata.
release_channel: "main"                               # Firmware release channel shown in diagnostics (`main` or `dev`).
hp_perf_map_header: "openquatt/includes/hp_perf_map.h" # C++ performance-map header include path.
thermal_request_logic_header: "openquatt/includes/oq_thermal_request_logic.h" # Shared C++ helper include for request/control glue.
heating_curve_logic_header: "openquatt/includes/oq_heating_curve_logic.h" # Shared C++ helper include for curve runtime state and naming.
dhw_controller_logic_header: "openquatt/includes/oq_dhw_controller_logic.h" # Shared C++ helper include for DHW finite-state control.
oq_webserver_css_url: ""                            # Optional external CSS for the ESPHome web UI.
oq_webserver_js_url: ""                               # Custom OpenQuatt app is primary; load ESPHome fallback lazily on demand.

# ----------------------------
# HARDWARE
# ----------------------------
# Hardware-specific substitutions are provided by per-profile files:
# - openquatt/profiles/oq_substitutions_waveshare.yaml
# - openquatt/profiles/oq_substitutions_heatpump_listener.yaml

# ----------------------------
# SUPERVISORY CONTROL MODE
# ----------------------------
oq_supervisory_loop_s: "5"                            # Main interval of the supervisory state machine [s].
oq_power_soft_w: "3400.0"                             # Soft power threshold for cap-down logic [W].
oq_power_peak_w: "3650.0"                             # Peak power threshold for fast cap-down [W].
oq_power_recover_w: "3300.0"                          # Power level below which cap can recover [W].
oq_power_peak_trip_s: "15"                            # Time above peak required for a fast cap step [s].
oq_power_soft_trip_s: "300"                           # Time above soft required for a mild cap step [s].
oq_power_recover_s: "60"                              # Time below recover required for cap recovery [s].
oq_power_cap_max_f: "20"                              # Upper limit of demand-cap factor f.
oq_power_cap_nan_f: "16"                              # Fail-safe cap factor for invalid power measurement.
oq_cm_prepost_s: "30"                                 # Duration of CM1 pre/postflow window [s].
oq_cm_min_flow_lph: "250.0"                           # Minimum valid flow for compressor operation [L/h].
oq_cm_flow_fault_s: "60"                              # Low-flow duration before fault becomes active [s].
oq_cm_flow_recover_s: "30"                            # Flow recovery duration before fault is cleared [s].
oq_cm2_idle_exit_s: "90"                              # Exit CM2 if both HPs are idle for this duration while demand remains > 0 [s].
oq_low_load_fallback_off_w: "900"                     # Internal fallback OFF threshold when no dynamic low-load input is available [W].
oq_low_load_fallback_on_w: "1300"                     # Internal fallback ON threshold when no dynamic low-load input is available [W].
oq_low_load_dyn_cache_max_s: "60"                     # Maximum age for reusing last-known-good dynamic low-load thresholds [s].
oq_ph_start_confirm_s: "30"                           # Power House start confirmation: demand must stay active for this time before CM1/CM2 startup [s].
oq_cm_frost_on_c: "5.0"                               # Frost protection enable threshold [°C].
oq_cm_frost_off_c: "6.0"                              # Frost protection disable threshold (hysteresis) [°C].
oq_cm_frost_nan_grace_s: "30"                         # Startup grace before NaN outside temp triggers frost fail-safe [s].
oq_cm98_diag_max_s: "1800"                            # Maximum duration of diagnostic Force CM98 override [s].
oq_cm3_promote_s: "300"                               # Required deficit duration for CM2 -> CM3 promotion [s].
oq_cm3_demote_s: "120"                                # Required low-deficit duration for CM3 -> CM2 demotion [s].
oq_cm3_min_run_s: "300"                               # Minimum dwell time in CM3 before demotion [s].
oq_cm2_min_run_s: "120"                               # Minimum dwell time in CM2 before promotion [s].
oq_cm0_sticky_wait_s: "86400"                         # Wait time in CM0 before sticky-pump run starts [s].
oq_cm0_sticky_run_s: "60"                             # Duration of sticky-pump run in CM0 [s].
oq_cm0_pump_stop_ipwm: "1000.0"                       # iPWM setpoint that forces pump off in CM0.

# ----------------------------
# HEATING STRATEGY
# ----------------------------
oq_strategy_loop_s: "5"                               # Interval for strategy calculations and mode switching [s].
oq_strategy_demand_max_f: "20.0"                      # Upper bound of demand scale for mapping PID/power -> f.
oq_selected_input_stale_hold_s: "300"                 # Hold selected HA-backed inputs this long when they briefly disappear during reloads [s].
oq_temp_guard_delta_c: "0.5"                          # Minimum valid margin between T0 and Tc in the house model [°C].
oq_outside_temp_stale_s: "1200"                       # Ignore a local outdoor reading when it stays frozen while the same HP still shows fresh activity [s].

# ----------------------------
# HEAT CONTROL
# ----------------------------
oq_heat_loop_tick_s: "5"                              # Scheduler tick for heat-control loop [s].
oq_heat_loop_curve_s: "30"                            # Effective heat-control cadence in Heating Curve mode [s].
oq_heat_loop_powerhouse_s: "60"                       # Effective heat-control cadence in Power House mode [s].
oq_cop_min_input_w: "10.0"                            # Minimum electrical input for a valid COP calculation [W].
oq_hp_min_off_s: "240"                                # Minimum per-HP off-time before any restart [s].
oq_optimizer_soft_w: "3400.0"                         # Soft limit for electrical HP power in optimizer [W]; peak limit follows oq_power_peak_w.
oq_optimizer_penalty_per_w: "5.0"                     # Cost factor above soft limit [cost/W].
oq_optimizer_topology_power_margin_w: "150.0"         # Required power delta before a single<->duo topology switch counts as a meaningful efficiency gain [W].
oq_optimizer_topology_heat_advantage_w: "450.0"       # Required heat-match advantage before a less-efficient topology may override the efficiency-first choice [W].
oq_defrost_power_factor: "0.764"                      # Thermal derate on a defrosting HP in duo dispatch.
oq_defrost_comp_min_f: "6"                            # Minimum demand f before single-defrost compensation is applied.
oq_defrost_comp_boost_steps: "1"                      # Extra level steps on non-defrost HP during single-defrost compensation.

# ----------------------------
# FLOW CONTROL
# ----------------------------
oq_flow_loop_s: "5"                                   # Control interval of the flow-control loop [s].
oq_flow_mismatch_threshold_lph: "150.0"               # Allowed HP1-vs-HP2 flow difference before mismatch logic starts [L/h].
oq_flow_mismatch_hyst_lph: "50.0"                     # Hysteresis on mismatch detection to prevent chatter [L/h].
oq_flow_kp_min: "0.00"                                # Lower bound for Flow PI Kp.
oq_flow_kp_max: "0.20"                                # Upper bound for Flow PI Kp (broader for cross-install tuning).
oq_flow_ki_min: "0.0000"                              # Lower bound for Flow PI Ki.
oq_flow_ki_max: "0.0100"                              # Upper bound for Flow PI Ki (broader for cross-install tuning).

# ----------------------------
# FLOW AUTOTUNE
# ----------------------------
oq_flow_ts: "5"                                       # Autotune/main-loop sample time; must match flow-control [s].
oq_flow_pwm_min: "50"                                 # Lower pump iPWM bound during autotune.
oq_flow_pwm_max: "850"                                # Upper pump iPWM bound during autotune.
oq_flow_autotune_min_step: "5"                        # Minimum iPWM step size for the step test.
oq_flow_autotune_ss_window: "3"                       # Rolling-window size for steady-state estimation [samples].
oq_flow_autotune_settle_s: "30"                       # Minimum settle time on baseline PWM before applying the step [s].
oq_flow_autotune_stable_band_lph: "12.0"              # Max flow spread in baseline window to qualify as stable [L/h].
oq_flow_autotune_tau_fallback_s: "30.0"               # Fallback time constant when t63 is invalid [s].
oq_flow_autotune_lambda_min_s: "10.0"                 # Minimum IMC lambda for conservative PI tuning [s].

# ----------------------------
# THERMAL CONSTANTS
# ----------------------------
oq_water_cp_j_per_kgk: "4186.0"                       # Specific heat capacity of water [J/(kg*K)].

# ----------------------------
# BOILER CONTROL
# ----------------------------
oq_boiler_loop_s: "5"                                 # Main interval for boiler gating/safety loop [s].
oq_dhw_loop_s: "2"                                    # Main interval for DHW state machine [s].
oq_dhw_valve_relay_pin: "GPIO40"                      # Active relay output to energize 3-way valve to boiler position.
oq_dhw_valve_relay_inverted: "true"                   # 2-channel relay boards are usually active-low (recommended true).
oq_boiler_relay_inverted: "true"                      # 3 kW element contactor relay polarity (active-low typical).
oq_dhw_valve_aux_drive_pin: "GPIO11"                  # Aux contact drive GPIO for 2-wire valve feedback wiring.
oq_dhw_valve_aux_sense_pin: "GPIO13"                  # Aux contact sense GPIO for 2-wire valve feedback wiring.
dhw_modbus_slave_id: "1"                              # External DHW sensor-node Modbus slave ID.
dhw_modbus_baud: "19200"                              # External DHW sensor-node serial speed [baud].
dhw_modbus_poll_s: "5"                                # Poll interval for DHW tank temperatures [s].
dhw_modbus_reg_bottom: "2133"                         # Register for tank bottom (0-based offset of 42134). Try 42134 if your device uses absolute addressing.
dhw_modbus_reg_top: "2134"                            # Register for tank top (0-based offset of 42135). Try 42135 if your device uses absolute addressing.
max31865_spi_sck_pin: "GPIO18"                        # Shared SPI SCK for dual MAX31865 (profile may override).
max31865_spi_mosi_pin: "GPIO23"                       # Shared SPI MOSI for dual MAX31865 (profile may override).
max31865_spi_miso_pin: "GPIO19"                       # Shared SPI MISO for dual MAX31865 (profile may override).
max31865_1_cs_pin: "GPIO4"                            # CS pin for MAX31865 #1 (profile may override).
max31865_2_cs_pin: "GPIO5"                            # CS pin for MAX31865 #2 (profile may override).
oq_max31865_rtd_nominal_ohm: "1000.0"                 # PT1000 nominal resistance [ohm].
oq_max31865_ref_res_ohm: "4300.0"                     # MAX31865 reference resistor [ohm] (common breakout value 4k3).
oq_max31865_wires: "2"                                # PT1000 wiring mode (2/3/4).
oq_max31865_update_s: "5"                             # Update interval for PT1000 sensors [s].

# ----------------------------
# OPEN THERM SLAVE
# ----------------------------
oq_ot_enabled_default: "false"                        # Default runtime state of the OT slave bus handler.
oq_ot_response_enabled_default: "true"                # Allow the OT slave to answer thermostat requests by default.

# ----------------------------
# CIC FEED
# ----------------------------
cic_backoff_start_ms: "5000"                          # Initial polling backoff after success/startup [ms].
cic_backoff_max_ms: "120000"                          # Maximum exponential backoff on errors [ms].
cic_poll_tick_ms: "5000"                              # Scheduler tick for CIC main loop [ms].
cic_min_url_len: "10"                                 # Minimum URL length before starting a request [chars].
cic_stale_after_ms: "600000"                          # Data becomes stale after this time without a successful fetch [ms].
cic_feed_error_trip_n: "3"                            # Feed OK becomes false after N consecutive fetch/parse errors.
oq_cic_restore_mode_default: "RESTORE_DEFAULT_OFF"    # Default CIC polling state.

# ----------------------------
# HA INPUT ENTITY MAPPING
# ----------------------------
ha_outside_temp_entity_id: "sensor.openquatt_ext_outdoor_temperature"      # HA proxy entity for outside temperature [degC].
ha_water_supply_temp_entity_id: "sensor.openquatt_ext_water_supply_temperature" # HA proxy entity for water supply temperature [degC].
ha_room_setpoint_entity_id: "sensor.openquatt_ext_room_setpoint"           # HA proxy entity for thermostat room setpoint [degC].
ha_room_temp_entity_id: "sensor.openquatt_ext_room_temperature"             # HA proxy entity for thermostat room temperature [degC].
ha_cooling_enable_entity_id: "binary_sensor.openquatt_ext_cooling_enable"   # HA proxy entity for external cooling enable.
ha_cooling_room_count_entity_id: "sensor.openquatt_ext_cooling_room_count"  # HA proxy entity for configured cooling room count.
ha_cooling_room_1_dew_point_entity_id: "sensor.openquatt_ext_cooling_room_1_dew_point_direct" # HA proxy for cooling room 1 dew point [degC].
ha_cooling_room_1_temp_entity_id: "sensor.openquatt_ext_cooling_room_1_temperature" # HA proxy for cooling room 1 temperature [degC].
ha_cooling_room_1_humidity_entity_id: "sensor.openquatt_ext_cooling_room_1_humidity" # HA proxy for cooling room 1 humidity [%].
ha_cooling_room_2_dew_point_entity_id: "sensor.openquatt_ext_cooling_room_2_dew_point_direct" # HA proxy for cooling room 2 dew point [degC].
ha_cooling_room_2_temp_entity_id: "sensor.openquatt_ext_cooling_room_2_temperature" # HA proxy for cooling room 2 temperature [degC].
ha_cooling_room_2_humidity_entity_id: "sensor.openquatt_ext_cooling_room_2_humidity" # HA proxy for cooling room 2 humidity [%].
ha_cooling_room_3_dew_point_entity_id: "sensor.openquatt_ext_cooling_room_3_dew_point_direct" # HA proxy for cooling room 3 dew point [degC].
ha_cooling_room_3_temp_entity_id: "sensor.openquatt_ext_cooling_room_3_temperature" # HA proxy for cooling room 3 temperature [degC].
ha_cooling_room_3_humidity_entity_id: "sensor.openquatt_ext_cooling_room_3_humidity" # HA proxy for cooling room 3 humidity [%].
ha_cooling_room_4_dew_point_entity_id: "sensor.openquatt_ext_cooling_room_4_dew_point_direct" # HA proxy for cooling room 4 dew point [degC].
ha_cooling_room_4_temp_entity_id: "sensor.openquatt_ext_cooling_room_4_temperature" # HA proxy for cooling room 4 temperature [degC].
ha_cooling_room_4_humidity_entity_id: "sensor.openquatt_ext_cooling_room_4_humidity" # HA proxy for cooling room 4 humidity [%].
ha_cooling_room_5_dew_point_entity_id: "sensor.openquatt_ext_cooling_room_5_dew_point_direct" # HA proxy for cooling room 5 dew point [degC].
ha_cooling_room_5_temp_entity_id: "sensor.openquatt_ext_cooling_room_5_temperature" # HA proxy for cooling room 5 temperature [degC].
ha_cooling_room_5_humidity_entity_id: "sensor.openquatt_ext_cooling_room_5_humidity" # HA proxy for cooling room 5 humidity [%].
ha_cooling_room_6_dew_point_entity_id: "sensor.openquatt_ext_cooling_room_6_dew_point_direct" # HA proxy for cooling room 6 dew point [degC].
ha_cooling_room_6_temp_entity_id: "sensor.openquatt_ext_cooling_room_6_temperature" # HA proxy for cooling room 6 temperature [degC].
ha_cooling_room_6_humidity_entity_id: "sensor.openquatt_ext_cooling_room_6_humidity" # HA proxy for cooling room 6 humidity [%].
ha_dhw_tank_top_entity_id: "sensor.openquatt_ext_dhw_tank_top" # HA proxy for DHW top sensor [degC].
ha_dhw_tank_bottom_entity_id: "sensor.openquatt_ext_dhw_tank_bottom" # HA proxy for DHW bottom sensor [degC].
ha_dhw_coil_in_entity_id: "sensor.openquatt_ext_dhw_coil_in" # HA proxy for DHW coil inlet [degC].
ha_dhw_coil_out_entity_id: "sensor.openquatt_ext_dhw_coil_out" # HA proxy for DHW coil outlet [degC].
ha_dhw_valve_aux_entity_id: "binary_sensor.openquatt_ext_dhw_valve_aux_cv" # HA proxy: valve aux true when valve is in CV position.
ha_dhw_hp_fault_entity_id: "binary_sensor.openquatt_ext_dhw_hp_fault" # HA proxy: upstream HP fault for DHW lockout.
ha_dhw_lockout_entity_id: "binary_sensor.openquatt_ext_dhw_lockout" # HA proxy manual lockout for DHW.
ha_dhw_solar_boost_entity_id: "binary_sensor.openquatt_ext_dhw_solar_boost" # HA proxy: solar surplus boost request.
ha_dhw_legionella_force_entity_id: "binary_sensor.openquatt_ext_dhw_legionella_force" # HA proxy: force legionella cycle.

# ----------------------------
# HP IO (MODBUS POLLING)
# ----------------------------
oq_modbus_update_interval_s: "5"                    # Base Modbus controller polling interval [s].
oq_modbus_command_throttle_ms: "300"                 # Minimum spacing between Modbus commands [ms].
oq_modbus_max_cmd_retries: "1"                       # Retries per Modbus command; keep low to avoid long blocking on bad links.
oq_skip_10s: "1"                                      # 1 skip; effective polling every 10s.
oq_skip_30s: "5"                                      # 5 skips; effective polling every 30s.
