# ==============================================================================
# OpenQuatt - Thermal Request Control
# ==============================================================================
#
# Goal:
#   Consume strategy outputs, publish an explicit thermal request interface,
#   and prepare final actuator requests for HP1/HP2.
#
# Role in architecture:
#   Owns shared thermal-request control between strategy modules and the
#   downstream thermal actuator.
#
# What this package DOES do:
#   - Consumes oq_demand_raw (published by oq_strategy_manager)
#   - Consumes strategy outputs from oq_cooling_strategy / oq_heating_curve_strategy / oq_power_house_strategy
#   - Applies demand filtering to damp noise/jitter in heat demand
#   - Applies caps/limits on `f` before split
#   - Publishes `oq_request_*` as the explicit pre-actuator request interface
#   - Publishes finalized actuator requests for the downstream thermal actuator
#   - Owns shared request filtering, caps, guards, and actuator input logic
#   - Consumes shared HP capacity/deficit (`oq_P_hp_cap_w`, `oq_P_deficit_w`) for supervisory/debug logic
#
# What this package DOES NOT do:
#   - Has no dedicated temperature PID loop (strategy owns temperature-loop behavior)
#   - Does not implement flow interlock (flow-control + supervisory are leading)
#   - Does not determine Control Mode
#   - Does not control boiler directly (boiler follows CM3)
#   - Does not write HP working mode or compressor levels directly
#
# Key assumptions:
#   - `oq_demand_raw` is available from strategy and scaled to `f` range (0-20)
#   - Compressor levels are `select` entities with options '0'..'10'
#
# Interaction with Control Modes:
#   - Active in CM2/CM3 (heating)
#   - In CM0/CM1/CM98, compressor levels are forced to 0
#
# Safety / fail-safe:
#   - With inactive CM: compressor levels 0 (no heat production)
#   - Thermal request control is always subordinate to flow interlock via CM1
#
# Notes:
#   - Demand filter and runtime guards intentionally favor stability over fast level changes.
#   - This file now mixes:
#     1) shared gating / runtime anchors
#     2) explicit request-interface publication
#     3) final actuator-request preparation and safety gating
#
# ==============================================================================

# ----------------------------
# INTERNAL STATE
# ----------------------------
globals:
  # Explicit pre-actuator thermal request interface.
  - id: oq_request_mode_code
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_request_hp1_level
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_request_hp2_level
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_request_owner_hp
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_request_topology_code
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_request_strategy_code
    type: int
    restore_value: false
    initial_value: '0'

  # Final per-HP requests consumed by oq_thermal_actuator.
  - id: oq_actuator_hp1_req
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_actuator_hp2_req
    type: int
    restore_value: false
    initial_value: '0'

  # Shared filtered demand owned by the active strategy module.
  - id: oq_demand_filtered
    type: int
    restore_value: false
    initial_value: '0'

  # Previous filtered demand sample published by the active strategy module.
  - id: oq_demand_filtered_prev
    type: int
    restore_value: false
    initial_value: '0'

  # Shared heating-only filtered demand, kept separate from CM5 cooling demand.
  - id: oq_heating_demand_filtered
    type: int
    restore_value: false
    initial_value: '0'

  # Power House telemetry (W)
  - id: oq_P_hp_cap_w
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: oq_P_deficit_w
    type: float
    restore_value: false
    initial_value: '0.0'

  # Shared curve request state, currently published by the curve strategy.
  - id: oq_dual_hp_enabled
    type: bool
    restore_value: false
    initial_value: 'false'

  # Fractional elapsed minutes for dual-enable hold timing.
  - id: oq_dual_hp_enable_hold_elapsed_accum_min
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: oq_dual_hp_disable_hold_elapsed_accum_min
    type: float
    restore_value: false
    initial_value: '0.0'

  # Emergency dual-enable hold timing (curve mode capacity/deficit override).
  - id: oq_dual_hp_emergency_hold_elapsed_accum_min
    type: float
    restore_value: false
    initial_value: '0.0'

  # Last loop timestamp for elapsed-time scaling.
  - id: oq_heat_last_loop_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # Last control flavor observed by heat-control loop (0=Power House, 1=Heating Curve, 2=Cooling).
  - id: oq_heat_last_mode_code
    type: int
    restore_value: false
    initial_value: '-1'

  # Fractional runtime accumulation; converted to whole minutes.
  - id: hp1_runtime_accum_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: hp2_runtime_accum_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # Per-HP timestamp of the last measured transition into working_mode=Heating.
  # Minimum runtime is enforced from this real heating start, not from an earlier
  # request/apply transition that can happen before the compressor truly runs.
  - id: hp1_last_real_heat_start_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: hp2_last_real_heat_start_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: hp1_prev_heating_mode_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: hp2_prev_heating_mode_active
    type: bool
    restore_value: false
    initial_value: 'false'

  # Diagnostic: last computed lead pump based on runtime minutes.
  - id: oq_last_lead_hp
    type: int
    restore_value: false
    initial_value: '0'

  # Latched single-HP owner in heating-curve mode (0=none, 1=HP1, 2=HP2).
  # This prevents lead handovers while demand is continuously active.
  - id: oq_curve_single_owner_hp
    type: int
    restore_value: false
    initial_value: '0'

  # Per-HP timestamp for explicit level slew limiting.
  - id: hp1_last_level_change_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: hp2_last_level_change_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # Holds the current single-vs-dual choice briefly after an actual topology change.
  - id: oq_duo_request_hold_until_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_boot_startup_inhibit_logged
    type: bool
    restore_value: false
    initial_value: 'false'


# ----------------------------
# TUNING INPUTS
# ----------------------------
number:
  - platform: template
    id: oq_min_runtime_min
    name: "Minimum runtime"
    icon: mdi:timer-cog-outline
    unit_of_measurement: "s"
    min_value: 300
    max_value: 3600
    step: 30
    mode: slider
    restore_value: true
    optimistic: true
    initial_value: 300
    web_server:
      sorting_group_id: oq_heating_strategy

  # Dual-HP enable threshold on single-HP compressor level request (1..10).
  # Disable threshold is derived internally as max(1, enable - 1) to keep parameter count low.
  - platform: template
    id: oq_dual_hp_enable_level
    name: "Dual HP Enable Level"
    internal: ${hc_dual_tuning_internal}
    icon: mdi:arrow-up-bold-hexagon-outline
    unit_of_measurement: "lvl"
    min_value: 1
    max_value: 10
    step: 1
    mode: slider
    restore_value: true
    optimistic: true
    initial_value: 5
    web_server:
      sorting_group_id: oq_heating_strategy

  # Hold time before enabling dual-HP in curve mode.
  - platform: template
    id: oq_dual_hp_enable_hold_min
    name: "Dual HP Enable Hold"
    internal: ${hc_dual_tuning_internal}
    icon: mdi:timer-plus-outline
    unit_of_measurement: "min"
    min_value: 1
    max_value: 60
    step: 1
    mode: slider
    restore_value: true
    optimistic: true
    initial_value: 3
    web_server:
      sorting_group_id: oq_heating_strategy

  # Hold time before disabling dual-HP in curve mode.
  - platform: template
    id: oq_dual_hp_disable_hold_min
    name: "Dual HP Disable Hold"
    internal: ${hc_dual_tuning_internal}
    icon: mdi:timer-minus-outline
    unit_of_measurement: "min"
    min_value: 1
    max_value: 60
    step: 1
    mode: slider
    restore_value: true
    optimistic: true
    initial_value: 5
    web_server:
      sorting_group_id: oq_heating_strategy

# ----------------------------
# BUTTON
# ----------------------------
button:
  - platform: template
    id: oq_reset_runtime
    name: "${hc_runtime_reset_button_name}"
    icon: mdi:restart
    web_server:
      sorting_group_id: oq_heating_strategy
    on_press:
      - lambda: |-
          // Reset accumulated runtime counters and measured-start latches together,
          // so fairness and minimum-runtime diagnostics restart from a clean state.
          #if OQ_TOPOLOGY_DUO
          id(hp1_minutes) = 0;
          id(${hc_secondary_minutes_id}) = 0;
          id(hp1_runtime_accum_ms) = 0;
          id(hp2_runtime_accum_ms) = 0;
          id(hp1_last_real_heat_start_ms) = 0;
          id(hp2_last_real_heat_start_ms) = 0;
          id(hp1_prev_heating_mode_active) = false;
          id(hp2_prev_heating_mode_active) = false;
          ESP_LOGW("quatt", "Runtime counters reset (HP1+HP2).");
          #else
          id(hp1_minutes) = 0;
          id(hp1_runtime_accum_ms) = 0;
          id(hp1_last_real_heat_start_ms) = 0;
          id(hp1_prev_heating_mode_active) = false;
          ESP_LOGW("quatt", "Runtime counters reset (HP1).");
          #endif

# ----------------------------
# SENSORS (energie + status)
# ----------------------------
sensor:
  - platform: template
    id: oq_total_power_input
    name: "Total Power Input"
    icon: mdi:flash
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    web_server:
      sorting_group_id: oq_performance
    lambda: |-
      auto nz = [](float value) -> float { return isnan(value) ? 0.0f : value; };
      const float hp1_power_w = nz(id(hp1_power_input).state);
      #if OQ_TOPOLOGY_DUO
      const float hp2_power_w = nz(id(${hc_secondary_power_input_id}).state);
      const float total_input_w = hp1_power_w + hp2_power_w;
      #else
      const float total_input_w = hp1_power_w;
      #endif
      // Safety clamp against tiny negative noise from upstream math/rounding.
      return (total_input_w < 0.0f) ? 0.0f : total_input_w;

  - platform: template
    id: oq_heating_power_input
    name: "Heating Power Input"
    icon: mdi:flash
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    web_server:
      sorting_group_id: oq_performance
    lambda: |-
      auto nz = [](float value) -> float { return isnan(value) ? 0.0f : value; };
      const float hp1_mode = id(hp1_working_mode).state;
      const float hp1_power_w = (hp1_mode == 2.0f) ? nz(id(hp1_power_input).state) : 0.0f;
      #if OQ_TOPOLOGY_DUO
      const float hp2_mode = id(${hc_secondary_working_mode_id}).state;
      const float hp2_power_w = (hp2_mode == 2.0f) ? nz(id(${hc_secondary_power_input_id}).state) : 0.0f;
      return hp1_power_w + hp2_power_w;
      #else
      return hp1_power_w;
      #endif

  - platform: template
    id: oq_cooling_power_input
    name: "Cooling Power Input"
    icon: mdi:flash
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    web_server:
      sorting_group_id: oq_performance
    lambda: |-
      auto nz = [](float value) -> float { return isnan(value) ? 0.0f : value; };
      const float hp1_mode = id(hp1_working_mode).state;
      const float hp1_power_w = (hp1_mode == 1.0f) ? nz(id(hp1_power_input).state) : 0.0f;
      #if OQ_TOPOLOGY_DUO
      const float hp2_mode = id(${hc_secondary_working_mode_id}).state;
      const float hp2_power_w = (hp2_mode == 1.0f) ? nz(id(${hc_secondary_power_input_id}).state) : 0.0f;
      return hp1_power_w + hp2_power_w;
      #else
      return hp1_power_w;
      #endif

  - platform: template
    id: oq_total_heat_power
    name: "Total Heat Power"
    icon: mdi:radiator
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 10s
    web_server:
      sorting_group_id: oq_performance
    lambda: |-
      const float hp1_heat_w = id(hp1_heat_power).state;
      #if OQ_TOPOLOGY_DUO
      const float hp2_heat_w = id(${hc_secondary_heat_power_id}).state;

      if (isnan(hp1_heat_w) && isnan(hp2_heat_w)) return NAN;
      if (isnan(hp1_heat_w)) return hp2_heat_w;
      if (isnan(hp2_heat_w)) return hp1_heat_w;

      return hp1_heat_w + hp2_heat_w;
      #else
      if (isnan(hp1_heat_w)) return NAN;
      return hp1_heat_w;
      #endif

  - platform: template
    id: oq_total_cooling_power
    name: "Total Cooling Power"
    icon: mdi:snowflake
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 10s
    web_server:
      sorting_group_id: oq_performance
    lambda: |-
      const float hp1_cooling_w = id(hp1_cooling_power).state;
      #if OQ_TOPOLOGY_DUO
      const float hp2_cooling_w = id(${hc_secondary_cooling_power_id}).state;

      if (isnan(hp1_cooling_w) && isnan(hp2_cooling_w)) return NAN;
      if (isnan(hp1_cooling_w)) return hp2_cooling_w;
      if (isnan(hp2_cooling_w)) return hp1_cooling_w;

      return hp1_cooling_w + hp2_cooling_w;
      #else
      if (isnan(hp1_cooling_w)) return NAN;
      return hp1_cooling_w;
      #endif

  - platform: template
    id: oq_total_cop
    name: "Total COP"
    icon: mdi:chart-bell-curve-cumulative
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    web_server:
      sorting_group_id: oq_performance
    lambda: |-
      const float total_input_w = id(oq_total_power_input).state;
      const float total_heat_w = id(oq_total_heat_power).state;

      if (isnan(total_input_w) || isnan(total_heat_w)) return NAN;
      if (fabsf(total_input_w) < ${oq_cop_min_input_w}) return NAN;

      return total_heat_w / total_input_w;

  - platform: template
    id: oq_total_eer
    name: "Total EER"
    icon: mdi:chart-bell-curve-cumulative
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    web_server:
      sorting_group_id: oq_performance
    lambda: |-
      const float total_input_w = id(oq_cooling_power_input).state;
      const float total_cooling_w = id(oq_total_cooling_power).state;

      if (isnan(total_input_w) || isnan(total_cooling_w)) return NAN;
      if (fabsf(total_input_w) < ${oq_cop_min_input_w}) return NAN;

      return total_cooling_w / total_input_w;

  - platform: template
    id: oq_demand_raw_sensor
    name: "Demand raw"
    icon: mdi:chart-line
    unit_of_measurement: "step"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5s
    web_server:
      sorting_group_id: oq_system_diagnostics
    lambda: |-
      return (float) id(oq_demand_raw);

  - platform: template
    id: oq_demand_filtered_sensor
    name: "Demand filtered"
    icon: mdi:chart-line-variant
    unit_of_measurement: "step"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5s
    web_server:
      sorting_group_id: oq_system_diagnostics
    lambda: |-
      return (float) id(oq_demand_filtered);

  - platform: template
    id: oq_hp1_compressor_level_sensor
    name: "HP1 compressor level"
    icon: mdi:stairs
    unit_of_measurement: "lvl"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5s
    web_server:
      sorting_group_id: oq_system_diagnostics
    lambda: |-
      if (!id(hp1_compressor_level).has_state()) return NAN;
      auto idx = id(hp1_compressor_level).active_index();
      if (!idx.has_value()) return NAN;
      return (float) idx.value();

  - platform: template
    id: oq_hp2_compressor_level_sensor
    name: "HP2 compressor level"
    internal: ${hc_hp2_diag_internal}
    icon: mdi:stairs
    unit_of_measurement: "lvl"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5s
    web_server:
      sorting_group_id: oq_system_diagnostics
    lambda: |-
      #if OQ_TOPOLOGY_DUO
      if (!id(${hc_secondary_compressor_level_id}).has_state()) return NAN;
      auto idx = id(${hc_secondary_compressor_level_id}).active_index();
      if (!idx.has_value()) return NAN;
      return (float) idx.value();
      #else
      return NAN;
      #endif


