# ============================================================================== 
# OpenQuatt - DHW Controller (Quatt Duo + 3-way valve + 3 kW element)
# ============================================================================== 
# Assumptions:
# - Tank/coil/feedback sensors are supplied from Home Assistant proxy entities.
# - Fallback "DHW source *" entities are exposed so users can manually map/drive
#   DHW inputs when external HA proxies are missing.
# - LilyGO valve aux feedback can be wired as a dry contact between 2 GPIOs:
#   one drive GPIO (held HIGH) and one sense GPIO (input with pulldown).
# - `valve_aux` raw semantics: ON=true means valve reports DHW/boiler position (AB->A).
#   Internally we convert this to `valve_feedback_cv` by inverting the raw bit.
# - OpenQuatt is currently controlled through published DHW request entities
#   (`oq_dhw_hp_request_active`, `oq_dhw_target_flow_temp`, `oq_dhw_block_cv_priority`).
#   This keeps the controller modular; an HA automation can map these to strategy setpoints.
# - Boiler relay output is used for the 3 kW element contactor.
# ============================================================================== 

output:
  - platform: gpio
    id: dhw_valve_relay_out
    pin:
      number: ${oq_dhw_valve_relay_pin}
      inverted: true

  - platform: gpio
    id: dhw_valve_aux_feedback_drive_out
    pin: ${oq_dhw_valve_aux_drive_pin}

  - platform: gpio
    id: boiler_relay_out
    pin:
      number: ${oq_boiler_relay_pin}
      inverted: true

globals:
  - id: oq_dhw_hp_request_active
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: oq_dhw_target_flow_temp
    type: float
    restore_value: false
    initial_value: 'NAN'

  - id: oq_dhw_block_cv_priority
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: oq_dhw_hp_level_request
    type: int
    restore_value: false
    initial_value: '4'

  - id: oq_dhw_state_code
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_dhw_fault_code
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_dhw_clear_fault_req
    type: bool
    restore_value: false
    initial_value: 'false'

  # Wallclock-based legionella bookkeeping (reboot persistent).
  - id: oq_dhw_legionella_last_done_epoch_s
    type: int64_t
    restore_value: true
    initial_value: '0'

  - id: oq_dhw_legionella_anchor_epoch_s
    type: int64_t
    restore_value: true
    initial_value: '0'

