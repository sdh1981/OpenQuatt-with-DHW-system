interval:
  - interval: ${oq_dhw_loop_s}s
    startup_delay: 4600ms
    then:
      - lambda: |-
          static oq_dhw::Controller controller;
          auto fmt_eta_s = [](int64_t delta_s) -> std::string {
            if (delta_s < 0) delta_s = 0;
            const uint32_t total_min = (uint32_t) (delta_s / 60LL);
            const uint32_t days = total_min / (24UL * 60UL);
            const uint32_t rem_min_after_days = total_min % (24UL * 60UL);
            const uint32_t hours = rem_min_after_days / 60UL;
            const uint32_t mins = rem_min_after_days % 60UL;
            char buf[48];
            if (days > 0) {
              snprintf(buf, sizeof(buf), "%lud %luh", (unsigned long) days, (unsigned long) hours);
            } else if (hours > 0) {
              snprintf(buf, sizeof(buf), "%luh %lum", (unsigned long) hours, (unsigned long) mins);
            } else {
              snprintf(buf, sizeof(buf), "%lum", (unsigned long) mins);
            }
            return std::string(buf);
          };
          auto fmt_epoch_local = [](int64_t epoch_s) -> std::string {
            if (epoch_s <= 0) return std::string("Onbekend");
            time_t tt = (time_t) epoch_s;
            struct tm tmbuf;
            if (localtime_r(&tt, &tmbuf) == nullptr) return std::string("Onbekend");
            char buf[32];
            if (strftime(buf, sizeof(buf), "%Y-%m-%d %H:%M", &tmbuf) == 0) return std::string("Onbekend");
            return std::string(buf);
          };

          if (id(oq_dhw_clear_fault_req)) {
            controller.clear_fault_latch();
            id(oq_dhw_clear_fault_req) = false;
          }

          oq_dhw::Config cfg;
          cfg.start_top_c = 46.0f;
          cfg.hp_stop_top_c = 49.0f;
          cfg.boost_target_c = id(oq_dhw_boost_target_c).state;
          cfg.legionella_target_c = id(oq_dhw_legionella_target_c).state;
          cfg.hp_target_flow_c = 55.0f;
          const float flow_min_cfg = id(oq_dhw_flow_min_lph).state;
          const float flow_max_cfg = id(oq_dhw_flow_max_lph).state;
          cfg.flow_min_lph = fminf(flow_min_cfg, flow_max_cfg);
          cfg.flow_max_lph = fmaxf(flow_min_cfg, flow_max_cfg);

          oq_dhw::Inputs in;
          in.now_ms = (uint32_t) millis();
          in.tank_top_c = id(dhw_tank_top_input).state;
          in.tank_bottom_c = id(dhw_tank_bottom_input).state;
          in.coil_in_c = id(dhw_coil_in_input).state;
          in.coil_out_c = id(dhw_coil_out_input).state;

          in.valve_feedback_valid = true;
          // Raw aux contact closes in DHW position; controller expects CV=true.
          in.valve_feedback_cv = !id(dhw_valve_aux_cv_input).state;

          in.flow_valid = id(flow_rate_selected).has_state() && !isnan(id(flow_rate_selected).state);
          in.flow_lph = in.flow_valid ? id(flow_rate_selected).state : NAN;

          const bool hp_fault_from_ha = id(dhw_hp_fault_ha).has_state() ? id(dhw_hp_fault_ha).state : id(oq_dhw_src_hp_fault).state;
          in.hp_fault_active = hp_fault_from_ha || id(oq_water_temp_hard_trip_active);

          const bool lockout_ha = id(dhw_lockout_ha).has_state() ? id(dhw_lockout_ha).state : id(oq_dhw_src_lockout).state;
          in.lockout_active = id(oq_dhw_lockout).state || lockout_ha;

          const bool solar_boost_ha =
              id(dhw_solar_boost_ha).has_state() ? id(dhw_solar_boost_ha).state : id(oq_dhw_src_solar_boost).state;
          const bool solar_boost_auto_negative_tariff =
              id(oq_dhw_solar_boost_auto).state &&
              id(dhw_tariff_ha).has_state() &&
              !isnan(id(dhw_tariff_ha).state) &&
              (id(dhw_tariff_ha).state < 0.0f);
          in.solar_boost_request = solar_boost_ha || solar_boost_auto_negative_tariff;
          in.legionella_force_request = id(dhw_legionella_force_ha).has_state() ? id(dhw_legionella_force_ha).state : id(oq_dhw_src_legionella_force).state;

          const auto out = controller.tick(in, cfg);

          const bool manual_test = id(oq_dhw_manual_test_mode).state;
          if (manual_test) {
            if (id(oq_dhw_manual_valve_cmd).state) {
              if (!id(dhw_valve_relay).state) id(dhw_valve_relay).turn_on();
            } else {
              if (id(dhw_valve_relay).state) id(dhw_valve_relay).turn_off();
            }

            if (id(oq_dhw_manual_element_cmd).state) {
              if (!id(boiler_relay).state) id(boiler_relay).turn_on();
            } else {
              if (id(boiler_relay).state) id(boiler_relay).turn_off();
            }

            id(oq_dhw_hp_request_active) = false;
            id(oq_dhw_target_flow_temp) = NAN;
            id(oq_dhw_block_cv_priority) = false;
          } else {
            if (out.valve_to_boiler) {
              if (!id(dhw_valve_relay).state) id(dhw_valve_relay).turn_on();
            } else {
              if (id(dhw_valve_relay).state) id(dhw_valve_relay).turn_off();
            }

            const bool valve_boiler_confirmed = !in.valve_feedback_valid || !in.valve_feedback_cv;
            const bool element_drive = out.element_on && valve_boiler_confirmed;

            if (element_drive) {
              if (!id(boiler_relay).state) id(boiler_relay).turn_on();
            } else {
              if (id(boiler_relay).state) id(boiler_relay).turn_off();
            }

            id(oq_dhw_hp_request_active) = out.hp_dhw_request;
            id(oq_dhw_target_flow_temp) = out.target_flow_temp_c;
            id(oq_dhw_block_cv_priority) = out.block_cv_priority;
          }
          id(oq_dhw_hp_level_request) = (int) roundf(id(oq_dhw_hp_level).state);
          id(oq_dhw_state_code) = (int) out.state;
          id(oq_dhw_fault_code) = (int) out.fault;

          if (out.state_changed) {
            id(oq_dhw_state_text).publish_state(oq_dhw::state_name(out.state));
            ESP_LOGI("oq_dhw", "state -> %s", oq_dhw::state_name(out.state));
          }

          if (out.fault_changed) {
            id(oq_dhw_fault_text).publish_state(oq_dhw::fault_name(out.fault));
            if (out.fault != oq_dhw::Fault::NONE) {
              ESP_LOGE("oq_dhw", "fault -> %s", oq_dhw::fault_name(out.fault));
            } else {
              ESP_LOGI("oq_dhw", "fault cleared");
            }
          }

          // Legionella run diagnostics on wallclock time (persistent over reboot).
          {
            auto now = id(oq_time).now();
            const bool now_valid = now.is_valid();
            const int64_t now_epoch_s = now_valid ? (int64_t) now.timestamp : 0;
            const int64_t interval_s = (int64_t) (cfg.legionella_interval_ms / 1000UL);

            if (now_valid && id(oq_dhw_legionella_anchor_epoch_s) <= 0) {
              id(oq_dhw_legionella_anchor_epoch_s) = now_epoch_s;
            }

            static int prev_state_code = (int) oq_dhw::State::IDLE_CV;
            const int cur_state_code = (int) out.state;
            const bool legionella_completed =
                now_valid &&
                (prev_state_code == (int) oq_dhw::State::LEGIONELLA) &&
                (cur_state_code == (int) oq_dhw::State::IDLE_CV) &&
                (out.fault == oq_dhw::Fault::NONE);
            if (legionella_completed) {
              id(oq_dhw_legionella_last_done_epoch_s) = now_epoch_s;
            }
            prev_state_code = cur_state_code;

            std::string last_run = "Nog niet uitgevoerd";
            const int64_t last_done_epoch = id(oq_dhw_legionella_last_done_epoch_s);
            if (last_done_epoch > 0) {
              last_run = fmt_epoch_local(last_done_epoch);
              if (now_valid && now_epoch_s >= last_done_epoch) {
                last_run += std::string(" (") + "geleden " + fmt_eta_s(now_epoch_s - last_done_epoch) + ")";
              }
            }

            std::string next_run = "Uitgeschakeld";
            if (interval_s > 0) {
              const int64_t base_epoch =
                  (last_done_epoch > 0) ? last_done_epoch : id(oq_dhw_legionella_anchor_epoch_s);
              if (base_epoch > 0) {
                const int64_t due_epoch = base_epoch + interval_s;
                next_run = fmt_epoch_local(due_epoch);
                if (now_valid) {
                  if (now_epoch_s >= due_epoch) {
                    next_run += std::string(" (nu verschuldigd)");
                  } else {
                    next_run += std::string(" (over ") + fmt_eta_s(due_epoch - now_epoch_s) + ")";
                  }
                }
              } else {
                next_run = "Wachten op tijdsync";
              }
            }

            static std::string last_pub_last = "";
            static std::string last_pub_next = "";
            if (last_run != last_pub_last) {
              id(oq_dhw_legionella_last_run_text).publish_state(last_run.c_str());
              last_pub_last = last_run;
            }
            if (next_run != last_pub_next) {
              id(oq_dhw_legionella_next_run_text).publish_state(next_run.c_str());
              last_pub_next = next_run;
            }
          }

