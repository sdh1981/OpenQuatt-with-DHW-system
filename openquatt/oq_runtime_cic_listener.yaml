# ==============================================================================
# OpenQuatt - Runtime (CIC Listener, no Modbus master)
# ==============================================================================
# This runtime intentionally does NOT define `modbus:` or `modbus_controller:`
# components, so this node will not send Modbus commands to heat pumps.
# ==============================================================================

logger:
  level: DEBUG
  initial_level: INFO
  baud_rate: 115200
  runtime_tag_levels: true

api:
  reboot_timeout: 0s

ota:
  - platform: esphome
  - platform: http_request

wifi:
  min_auth_mode: wpa2
  ap:
    ssid: "OpenQuatt"
    password: "openquatt"

captive_portal:

improv_serial:
  next_url: "http://{{ip_address}}/"

http_request:
  id: req
  useragent: esphome/openquatt
  timeout: 2s
  follow_redirects: true
  redirect_limit: 3
  buffer_size_rx: 2048
  buffer_size_tx: 1024

globals:
  - id: oq_fw_check_last_request_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

select:
  - platform: template
    name: "Firmware Update Channel"
    id: oq_firmware_update_channel
    icon: mdi:source-branch
    web_server:
      sorting_group_id: oq_diagnostics
    entity_category: config
    optimistic: true
    restore_value: true
    options: ["main", "dev"]
    initial_option: "${release_channel}"
    on_value:
      then:
        - lambda: |-
            if (x == "dev") {
              id(oq_firmware_update).set_source_url("${dev_release_manifest_url}");
            } else {
              id(oq_firmware_update).set_source_url("${main_release_manifest_url}");
            }

  - platform: template
    name: "Debug Level"
    id: debug_level_select
    icon: mdi:lan
    web_server:
      sorting_group_id: oq_diagnostics
    entity_category: diagnostic
    optimistic: true
    restore_value: true
    options: [NONE, ERROR, WARN, INFO, CONFIG, DEBUG]
    initial_option: INFO
    on_value:
      then:
        - lambda: |-
            int lvl =
              (x == "NONE")    ? 0 :
              (x == "ERROR")   ? 1 :
              (x == "WARN")    ? 2 :
              (x == "INFO")    ? 3 :
              (x == "CONFIG")  ? 4 :
                                 5;
            esphome::logger::global_logger->set_log_level(lvl);

button:
  - platform: restart
    name: Restart
    icon: mdi:restart
    id: restart_switch
    web_server:
      sorting_group_id: oq_diagnostics

  - platform: safe_mode
    name: Safe mode
    icon: mdi:shield-alert
    id: safe_mode_button
    web_server:
      sorting_group_id: oq_diagnostics

binary_sensor:
  - platform: status
    name: Status
    icon: mdi:check-circle-outline
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_diagnostics

sensor:
  - platform: uptime
    name: Uptime
    id: uptime_sensor
    internal: true
    icon: mdi:timer-outline
    update_interval: 60s
    device_class: duration
    unit_of_measurement: s
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_diagnostics

  - platform: wifi_signal
    name: WiFi Signal
    icon: mdi:wifi-arrow-left-right
    update_interval: 300s
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_diagnostics

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP Address
      icon: mdi:ip-network-outline
      entity_category: diagnostic
      web_server:
        sorting_group_id: oq_diagnostics
    ssid:
      name: WiFi SSID
      icon: mdi:wifi
      entity_category: diagnostic
      web_server:
        sorting_group_id: oq_diagnostics

  - platform: template
    id: oq_project_version_text
    name: OpenQuatt Version
    icon: mdi:tag-text-outline
    entity_category: diagnostic
    update_interval: never
    lambda: |-
      return {"${project_version}"};
    web_server:
      sorting_group_id: oq_diagnostics

  - platform: template
    id: oq_release_channel_text
    name: OpenQuatt Release Channel
    icon: mdi:source-branch
    entity_category: diagnostic
    update_interval: never
    lambda: |-
      return {"${release_channel}"};
    web_server:
      sorting_group_id: oq_diagnostics

update:
  - platform: http_request
    id: oq_firmware_update
    name: Firmware Update
    source: ${release_manifest_url}
    update_interval: 4h
    icon: mdi:update
    entity_category: diagnostic
    web_server:
      sorting_group_id: oq_diagnostics
