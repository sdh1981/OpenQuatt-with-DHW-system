# ==============================================================================
# OpenQuatt – Supervisory Control Modes
# ==============================================================================
#
# Goal:
#   Determines the active Control Mode (CM) as central state machine and publishes the system decision to the other packages.
#
# Role in architecture:
#   Single owner of Control Mode; coordinates subsystems by selecting CM (CM0/CM1/CM2/CM3/CM5/CM98).
#
# What this package DOES do:
#   - Determines base mode (idle / heating / cooling / frost) based on demand and conditions
#   - Applies flow override: with insufficient flow -> CM1 (holding)
#   - Supports test override: Force CM0/CM1 and Diagnostic Force CM98 (auto-expire)
#   - Automatically switches CM2 <-> CM3 based on thermal deficit (`oq_P_deficit_w`) with timers/hysteresis
#   - Publishes current CM as text_sensor (for example 'CM2', 'CM3', 'CM5')
#
# What this package DOES NOT do:
#   - Does not control compressor levels directly (heat-control does)
#   - Does not control pump PWM directly (flow-control does)
#   - Implements no temperature control (handled by climate PID)
#
# Key assumptions:
#   - Strategy status is available via the shared `oq_strategy_*` contract
#   - Thermal deficit (`oq_P_deficit_w`) is computed by the active strategy path for CM2<->CM3 promotion/demotion
#   - Flow signal is available and sufficiently reliable for flow override
#
# Interaction with Control Modes:
#   - CM0: idle (no heat demand)
#   - CM1: holding (heat demand but insufficient flow)
#   - CM2: heating (HP only)
#   - CM3: heating (HP + boiler auxiliary heating)
#   - CM5: passive cooling
#   - CM98: frost
#
# Safety / fail-safe:
#   - Flow override always has priority: at low flow, CM1 is enforced
#   - Timers/hysteresis prevent oscillation between CM2 and CM3
#   - Power limiter catches overshoot with conservative demand-cap fallback on NaN power input
#
# ==============================================================================

# ----------------------------
# TIME
# ----------------------------
time:
  - platform: sntp
    id: oq_time
    timezone: Europe/Amsterdam

# ----------------------------
# INTERNAL STATE
# ----------------------------
globals:
  # Frost hysteresis state for CM98 selection
  - id: oq_cm_frost_prev
    type: bool
    restore_value: true
    initial_value: 'false'

  # Pre/Postflow timer (CM1)
  - id: oq_cm1_until_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_cm1_next_after
    type: int
    restore_value: false
    initial_value: '0'  # 0=CM0, 2=CM2, 5=CM5, 98=CM98

  # Flow interlock timers
  - id: oq_lowflow_since_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_flow_recover_since_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_lowflow_fault_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: oq_cm2_idle_since_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_cm2_reentry_block_until_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_lowload_heat_latch
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: oq_cm2_entered_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_ph_start_confirm_since_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # Sticky Pump Protection (CM0-only)
  - id: oq_cm0_since_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_sticky_until_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  # ----------------------------
  # Boiler assist (CM3) state machine timers
  - id: oq_cm_last_change_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: oq_cm3_need_since_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_cm3_demote_since_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # ----------------------------
  # Supervisory override (test/commissioning)
  # AUTO / FORCE_CM0 / FORCE_CM1 / FORCE_CM98_DIAG (auto-expire)
  - id: oq_override_last_mode
    type: int
    restore_value: false
    initial_value: '0'  # 0=AUTO,1=CM0,2=CM1,3=CM98_DIAG
  - id: oq_override_cm98_since_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_control_mode_code
    type: int
    restore_value: false
    initial_value: '0'  # 0,1,2,3,5,98

  # ----------------------------
  # Power limiter (16A guard) - total demand cap
  # Cap is applied to total filtered demand f (0..20) before HP split.
  - id: oq_power_cap_f
    type: int
    restore_value: false
    initial_value: '20'

  - id: oq_power_over_soft_s
    type: int
    restore_value: false
    initial_value: '0'
  - id: oq_power_over_peak_s
    type: int
    restore_value: false
    initial_value: '0'
  - id: oq_power_under_ok_s
    type: int
    restore_value: false
    initial_value: '0'
  # DEBUG-RUNTIME START: Power House low-load diagnostics
  # Dynamic low-load diagnostics (Power House)
  - id: oq_low_load_pmin_dyn_w
    type: float
    restore_value: false
    initial_value: 'NAN'
  - id: oq_low_load_pmin_dyn_lkg_w
    type: float
    restore_value: false
    initial_value: 'NAN'
  - id: oq_low_load_off_dyn_w
    type: float
    restore_value: false
    initial_value: 'NAN'
  - id: oq_low_load_on_dyn_w
    type: float
    restore_value: false
    initial_value: 'NAN'
  - id: oq_low_load_dyn_last_valid_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_low_load_dyn_source_state
    type: int
    restore_value: false
    initial_value: '0'  # 0=inactive,1=live,2=cached,3=fallback
  # DEBUG-RUNTIME END

