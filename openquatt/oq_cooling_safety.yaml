    icon: mdi:shield-thermometer
    unit_of_measurement: "°C"
    min_value: 0.0
    max_value: 4.0
    step: 0.1
    mode: box
    optimistic: true
    restore_value: true
    initial_value: 2.0
    entity_category: config
    web_server:
      sorting_group_id: oq_control

  - platform: template
