  - platform: template
    id: cooling_valid_room_count
    name: "Cooling Valid Room Count"
    icon: mdi:counter
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      // Count how many configured cooling rooms provide a usable dew point.
      // When all HA-backed room signals briefly disappear, keep the last valid
      // count for a short grace period so cooling safety does not chatter.
      const uint32_t hold_ms = (uint32_t)(${oq_selected_input_stale_hold_s}UL * 1000UL);
      const uint32_t now_ms = (uint32_t) millis();
      int configured_count = (int) lroundf(id(cooling_room_count_selected).state);
      if (configured_count < 0) configured_count = 0;
      if (configured_count > 6) configured_count = 6;

      int valid_count = 0;
      auto count_valid = [&](sensor::Sensor *candidate) {
        if (candidate != nullptr && candidate->has_state() && !isnan(candidate->state)) valid_count += 1;
      };

      if (configured_count >= 1) count_valid(id(cooling_room_1_dew_point_effective));
      if (configured_count >= 2) count_valid(id(cooling_room_2_dew_point_effective));
      if (configured_count >= 3) count_valid(id(cooling_room_3_dew_point_effective));
      if (configured_count >= 4) count_valid(id(cooling_room_4_dew_point_effective));
      if (configured_count >= 5) count_valid(id(cooling_room_5_dew_point_effective));
      if (configured_count >= 6) count_valid(id(cooling_room_6_dew_point_effective));

      const bool signal_valid = (configured_count == 0) || (valid_count > 0);
      if (signal_valid) {
        id(oq_cooling_valid_room_count_last_valid) = (float) valid_count;
        id(oq_cooling_valid_room_count_last_valid_ms) = now_ms;
        id(oq_cooling_valid_room_count_hold_active) = false;
        return (float) valid_count;
      }

      id(oq_cooling_valid_room_count_hold_active) = false;
      if (hold_ms > 0 &&
          id(oq_cooling_valid_room_count_last_valid_ms) > 0 &&
          (uint32_t)(now_ms - id(oq_cooling_valid_room_count_last_valid_ms)) < hold_ms) {
        id(oq_cooling_valid_room_count_hold_active) = true;
        return id(oq_cooling_valid_room_count_last_valid);
      }

      return 0.0f;
    web_server:
      sorting_group_id: oq_cooling

  - platform: template
    id: cooling_dew_point_selected
    name: "Cooling Dew Point (Selected)"
    icon: mdi:water-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      // Use the highest valid dew point among the configured cooling rooms.
      // Hold the last valid aggregate briefly through HA reload gaps.
      const uint32_t hold_ms = (uint32_t)(${oq_selected_input_stale_hold_s}UL * 1000UL);
      const uint32_t now_ms = (uint32_t) millis();
      int configured_count = (int) lroundf(id(cooling_room_count_selected).state);
      if (configured_count < 0) configured_count = 0;
      if (configured_count > 6) configured_count = 6;

      float selected_c = NAN;
      auto consider = [&](sensor::Sensor *candidate) {
        if (candidate == nullptr || !candidate->has_state() || isnan(candidate->state)) return;
        if (isnan(selected_c)) selected_c = candidate->state;
        else selected_c = fmaxf(selected_c, candidate->state);
      };

      if (configured_count >= 1) consider(id(cooling_room_1_dew_point_effective));
      if (configured_count >= 2) consider(id(cooling_room_2_dew_point_effective));
      if (configured_count >= 3) consider(id(cooling_room_3_dew_point_effective));
      if (configured_count >= 4) consider(id(cooling_room_4_dew_point_effective));
      if (configured_count >= 5) consider(id(cooling_room_5_dew_point_effective));
      if (configured_count >= 6) consider(id(cooling_room_6_dew_point_effective));

      if (!isnan(selected_c)) {
        id(oq_cooling_dew_point_selected_last_valid_c) = selected_c;
        id(oq_cooling_dew_point_selected_last_valid_ms) = now_ms;
        id(oq_cooling_dew_point_selected_hold_active) = false;
        return selected_c;
      }

      id(oq_cooling_dew_point_selected_hold_active) = false;
      if (configured_count > 0 &&
          hold_ms > 0 &&
          id(oq_cooling_dew_point_selected_last_valid_ms) > 0 &&
          (uint32_t)(now_ms - id(oq_cooling_dew_point_selected_last_valid_ms)) < hold_ms &&
          !isnan(id(oq_cooling_dew_point_selected_last_valid_c))) {
        id(oq_cooling_dew_point_selected_hold_active) = true;
        return id(oq_cooling_dew_point_selected_last_valid_c);
      }

      return NAN;
    web_server:
      sorting_group_id: oq_cooling

  - platform: template
    id: minimum_safe_supply_temp
    name: "Cooling Minimum Safe Supply Temp"
    icon: mdi:shield-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      // This is the central cooling guardrail: never target water below dew point + margin.
      if (!id(cooling_dew_point_selected).has_state() || isnan(id(cooling_dew_point_selected).state)) return NAN;
      if (!id(cooling_safety_margin_selected).has_state() || isnan(id(cooling_safety_margin_selected).state)) return NAN;
      return id(cooling_dew_point_selected).state + id(cooling_safety_margin_selected).state;
    web_server:
      sorting_group_id: oq_cooling

  - platform: template
    id: cooling_fallback_night_min_outdoor_temp
    name: "Cooling Fallback Night Minimum Outdoor Temp"
    icon: mdi:weather-night
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 60s
    lambda: |-
      if (!id(oq_time).now().is_valid()) return NAN;
      const auto now = id(oq_time).now();
      if (now.hour < 6 &&
          id(oq_cooling_fallback_night_window_day_key) >= 0 &&
          !isnan(id(oq_cooling_fallback_night_min_current_c))) {
        return id(oq_cooling_fallback_night_min_current_c);
      }
      if (!isnan(id(oq_cooling_fallback_night_min_last_c))) {
        return id(oq_cooling_fallback_night_min_last_c);
      }
      return NAN;
    web_server:
      sorting_group_id: oq_cooling

  - platform: template
    id: cooling_fallback_min_supply_temp
    name: "Cooling Fallback Minimum Supply Temp"
    icon: mdi:thermometer-chevron-down
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      // Conservative fallback floor for systems without a dew-point source.
      if (!id(outside_temp_selected).has_state() || isnan(id(outside_temp_selected).state)) return NAN;
      const float outside_c = id(outside_temp_selected).state;
      if (outside_c < 20.0f) return NAN;

      float base_floor_c = 19.0f;
      if (outside_c >= 32.0f) base_floor_c = 22.0f;
      else if (outside_c >= 28.0f) base_floor_c = 21.0f;
      else if (outside_c >= 24.0f) base_floor_c = 20.0f;

      float correction_c = 0.0f;
      if (id(cooling_fallback_night_min_outdoor_temp).has_state() &&
          !isnan(id(cooling_fallback_night_min_outdoor_temp).state)) {
        const float night_min_c = id(cooling_fallback_night_min_outdoor_temp).state;
        if (night_min_c >= 20.0f) return NAN;
        if (night_min_c >= 19.0f) correction_c = 2.0f;
        else if (night_min_c >= 18.0f) correction_c = 1.0f;
      }

      return base_floor_c + correction_c;
    web_server:
      sorting_group_id: oq_cooling

  - platform: template
    id: cooling_effective_min_supply_temp
    name: "Cooling Effective Minimum Supply Temp"
    icon: mdi:shield-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      if (id(minimum_safe_supply_temp).has_state() && !isnan(id(minimum_safe_supply_temp).state)) {
        return id(minimum_safe_supply_temp).state;
      }
      if (id(cooling_fallback_active).state &&
          id(cooling_fallback_min_supply_temp).has_state() &&
          !isnan(id(cooling_fallback_min_supply_temp).state)) {
        return id(cooling_fallback_min_supply_temp).state;
      }
      return NAN;
    web_server:
      sorting_group_id: oq_cooling

interval:
  - interval: 60s
    then:
      - lambda: |-
          // Track the minimum selected outside temperature during the local 00:00-06:00 window.
          if (!id(oq_time).now().is_valid()) return;
          if (!id(outside_temp_selected).has_state() || isnan(id(outside_temp_selected).state)) return;

          const auto now = id(oq_time).now();
          const int day_key = (now.year * 10000) + (now.month * 100) + now.day_of_month;
          const bool in_night_window = now.hour < 6;
          const float outside_c = id(outside_temp_selected).state;

          if (in_night_window) {
            if (id(oq_cooling_fallback_night_window_day_key) != day_key) {
              id(oq_cooling_fallback_night_window_day_key) = day_key;
              id(oq_cooling_fallback_night_min_current_c) = outside_c;
            } else if (isnan(id(oq_cooling_fallback_night_min_current_c))) {
              id(oq_cooling_fallback_night_min_current_c) = outside_c;
            } else {
              id(oq_cooling_fallback_night_min_current_c) =
                  fminf(id(oq_cooling_fallback_night_min_current_c), outside_c);
            }
            return;
          }

          if (id(oq_cooling_fallback_night_window_day_key) >= 0 &&
              id(oq_cooling_fallback_night_window_day_key) != id(oq_cooling_fallback_night_min_last_day_key) &&
              !isnan(id(oq_cooling_fallback_night_min_current_c))) {
            id(oq_cooling_fallback_night_min_last_c) = id(oq_cooling_fallback_night_min_current_c);
            id(oq_cooling_fallback_night_min_last_day_key) = id(oq_cooling_fallback_night_window_day_key);
          }
