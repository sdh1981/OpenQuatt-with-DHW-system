# ==============================================================================
# OpenQuatt - Cooling Safety Inputs and Derived Signals
# ==============================================================================
#
# Goal:
#   Build the first cooling safety layer from HA-provided room dew point, temp,
#   and humidity inputs.
#
# Scope:
#   - Calculate per-room dew point with ESPHome 2026.3 `dew_point`
#   - Select the effective dew point per room (direct wins over calculated)
#   - Derive the global selected dew point, valid-room count, and minimum safe
#     supply temperature
#
# ==============================================================================

globals:
  - id: oq_cooling_request_latched
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: oq_cooling_fallback_night_min_current_c
    type: float
    restore_value: false
    initial_value: 'NAN'
  - id: oq_cooling_fallback_night_window_day_key
    type: int
    restore_value: false
    initial_value: '-1'
  - id: oq_cooling_fallback_night_min_last_c
    type: float
    restore_value: true
    initial_value: 'NAN'
  - id: oq_cooling_fallback_night_min_last_day_key
    type: int
    restore_value: true
    initial_value: '-1'

  - id: oq_cooling_room_count_selected_last_valid
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: oq_cooling_room_count_selected_last_valid_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_cooling_room_count_selected_hold_active
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: oq_cooling_valid_room_count_last_valid
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: oq_cooling_valid_room_count_last_valid_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_cooling_valid_room_count_hold_active
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: oq_cooling_dew_point_selected_last_valid_c
    type: float
    restore_value: false
    initial_value: 'NAN'
  - id: oq_cooling_dew_point_selected_last_valid_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: oq_cooling_dew_point_selected_hold_active
    type: bool
    restore_value: false
    initial_value: 'false'

