    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: oq_cooling

  - platform: template
    id: cooling_room_count_selected
    name: "Cooling Room Count (Selected)"
    icon: mdi:counter
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      // Hold the configured room count briefly through HA reload gaps.
      const uint32_t hold_ms = (uint32_t)(${oq_selected_input_stale_hold_s}UL * 1000UL);
      const uint32_t now_ms = (uint32_t) millis();

      if (id(cooling_room_count_ha).has_state() && !isnan(id(cooling_room_count_ha).state)) {
        int count = (int) lroundf(id(cooling_room_count_ha).state);
        if (count < 0) count = 0;
        if (count > 6) count = 6;
        id(oq_cooling_room_count_selected_last_valid) = (float) count;
        id(oq_cooling_room_count_selected_last_valid_ms) = now_ms;
        id(oq_cooling_room_count_selected_hold_active) = false;
        return (float) count;
      }

      id(oq_cooling_room_count_selected_hold_active) = false;
      if (hold_ms > 0 &&
          id(oq_cooling_room_count_selected_last_valid_ms) > 0 &&
          (uint32_t)(now_ms - id(oq_cooling_room_count_selected_last_valid_ms)) < hold_ms) {
        id(oq_cooling_room_count_selected_hold_active) = true;
        return id(oq_cooling_room_count_selected_last_valid);
      }

      return 0.0f;
    web_server:
      sorting_group_id: oq_cooling

  - platform: template
    id: cooling_safety_margin_selected
    name: "Cooling Safety Margin (Selected)"
    icon: mdi:shield-thermometer
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      float margin_c = id(cooling_safety_margin).state;
      if (margin_c < 0.0f) margin_c = 0.0f;
      if (margin_c > 4.0f) margin_c = 4.0f;
      return margin_c;
    web_server:
      sorting_group_id: oq_cooling

  - platform: template
    id: cooling_room_1_dew_point_effective
    name: "Cooling Room 1 Dew Point (Effective)"
    icon: mdi:water-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      // Prefer a direct dew point input; fall back to the local ESPHome calculation.
      if (id(cooling_room_1_dew_point_direct_ha).has_state() && !isnan(id(cooling_room_1_dew_point_direct_ha).state)) {
        return id(cooling_room_1_dew_point_direct_ha).state;
      }
      if (id(cooling_room_1_dew_point_calc).has_state() && !isnan(id(cooling_room_1_dew_point_calc).state)) {
        return id(cooling_room_1_dew_point_calc).state;
      }
      return NAN;
    web_server:
      sorting_group_id: oq_cooling

