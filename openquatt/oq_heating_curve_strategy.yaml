    lambda: |-
      const char *mode_name = oq_curve::capacity_mode_name(id(oq_curve_capacity_mode_code));
      return std::string(mode_name);

interval:
  - interval: ${oq_strategy_loop_s}s
    startup_delay: 800ms
    then:
      - lambda: |-
          // Curve strategy loop: maintain PID target and publish curve demand.
          // CM5 owns the thermal strategy interface while cooling is active, so the
          // curve path must go fully inactive there even when curve mode remains selected.
          const bool active = (id(oq_control_mode_code) != 5) && (id(oq_heat_mode_code) == 1);
          const int demand_max = (int) ${oq_strategy_demand_max_f};
          auto clamp_demand = [&](int demand)->int {
            if (demand < 0) return 0;
            if (demand > demand_max) return demand_max;
            return demand;
          };

          if (active) {
            const float spw = id(oq_supply_target_temp).state;
            const float pv = id(oq_system_supply_temp).state;
            if (isnan(spw) || isnan(pv)) {
              oq_curve::reset_control_state(
                id(oq_curve_demand_continuous),
                id(oq_demand_curve),
                id(oq_curve_demand_pre_guardrail),
                id(oq_curve_heat_request_active),
                id(oq_curve_stop_arm_ms),
                id(oq_curve_off_since_ms),
                id(oq_curve_restart_inhibit_active),
                id(oq_curve_regime_code));
            } else {
              const float cur2 = id(oq_heating_curve_pid).target_temperature;
              if (id(oq_heating_curve_pid).mode != CLIMATE_MODE_HEAT ||
                  isnan(cur2) || fabsf(cur2 - spw) >= 0.10f) {
                auto c2 = id(oq_heating_curve_pid).make_call();
                if (id(oq_heating_curve_pid).mode != CLIMATE_MODE_HEAT) {
                  c2.set_mode(CLIMATE_MODE_HEAT);
                }
                c2.set_target_temperature(spw);
                c2.perform();
              }
            }

            int d_out = clamp_demand(id(oq_demand_curve));
            if (id(oq_water_temp_hard_trip_active)) d_out = 0;
            id(oq_demand_raw) = d_out;

            id(oq_strategy_phase_code) = id(oq_curve_regime_code);
            id(oq_strategy_requested_power_w) = NAN;
            id(oq_strategy_supply_target_temp) = id(oq_supply_target_temp).state;
            id(oq_strategy_heat_request_active) = id(oq_curve_heat_request_active);

            const int regime_code = id(oq_curve_regime_code);
            const char *phase_text =
                !id(oq_curve_heat_request_active) ? "off" : (regime_code == 1 ? "heat" : "coast");
            const char *regime_text = oq_curve::regime_name(regime_code);
            id(oq_strategy_phase_text).publish_state(regime_text);

            char debug_buf[192];
            const float target_c = id(oq_supply_target_temp).state;
            const float supply_c = id(oq_system_supply_temp).state;
            snprintf(
              debug_buf, sizeof(debug_buf),
              "curve phase=%s reg=%s d=%.2f/%d pre=%d sp=%.2f pv=%.2f",
              phase_text, regime_text,
              id(oq_curve_demand_continuous), d_out,
              id(oq_curve_demand_pre_guardrail), target_c, supply_c);
            id(oq_strategy_debug_state).publish_state(debug_buf);
          } else {
            if (id(oq_heating_curve_pid).mode != CLIMATE_MODE_OFF) {
              auto c0 = id(oq_heating_curve_pid).make_call();
              c0.set_mode(CLIMATE_MODE_OFF);
              c0.perform();
            }
            oq_curve::reset_control_state(
              id(oq_curve_demand_continuous),
              id(oq_demand_curve),
              id(oq_curve_demand_pre_guardrail),
              id(oq_curve_heat_request_active),
              id(oq_curve_stop_arm_ms),
              id(oq_curve_off_since_ms),
              id(oq_curve_restart_inhibit_active),
              id(oq_curve_regime_code));
          }
      - if:
          condition:
            lambda: |-
              // Reset curve integral whenever curve mode is not in an active, heat-delivering state.
              if (id(oq_heat_mode_code) != 1) return false;
              if (id(oq_water_temp_hard_trip_active)) return true;
              if (id(oq_control_mode_code) != 2) return true;
              if (!id(oq_curve_heat_request_active)) return true;
              const float spw = id(oq_supply_target_temp).state;
              const float pv  = id(oq_system_supply_temp).state;
              if (isnan(spw) || isnan(pv)) return true;

              const bool hp1_level_on = id(hp1_last_applied_level) > 0;
              const bool hp2_level_on = id(${curve_secondary_last_applied_level_id}) > 0;
              const float hp1_mode_raw = id(hp1_working_mode).state;
              const float hp2_mode_raw = id(${curve_secondary_working_mode_id}).state;
              const bool hp1_heating = !isnan(hp1_mode_raw) && ((int) roundf(hp1_mode_raw) == 2);
              const bool hp2_heating = !isnan(hp2_mode_raw) && ((int) roundf(hp2_mode_raw) == 2);
              const bool hp_delivering =
                  (hp1_level_on && hp1_heating) || (hp2_level_on && hp2_heating);
              return !hp_delivering;
          then:
            - climate.pid.reset_integral_term: oq_heating_curve_pid

  - interval: ${oq_heat_loop_tick_s}s
    startup_delay: 4000ms
    then:
      - lambda: |-
          // Heating-curve strategy: owns direct demand and per-HP dispatch output.
          const int cm_code = id(oq_control_mode_code);
          const bool active = (cm_code != 5) && (id(oq_heat_mode_code) == 1);
          if (!active) {
            oq_curve::reset_request_state(
              id(oq_curve_request_last_loop_ms),
              id(oq_curve_request_total_level),
              id(oq_curve_request_owner_hp),
              id(oq_curve_dispatch_hp1_level),
              id(oq_curve_dispatch_hp2_level),
              id(oq_curve_capacity_mode_code));
            oq_request::reset_dual_runtime_state(
              id(oq_dual_hp_enabled),
              id(oq_dual_hp_enable_hold_elapsed_accum_min),
              id(oq_dual_hp_disable_hold_elapsed_accum_min),
              id(oq_dual_hp_emergency_hold_elapsed_accum_min),
              id(oq_curve_single_owner_hp),
              id(oq_duo_request_hold_until_ms),
              0);
            return;
          }

          const uint32_t now_ms = (uint32_t) millis();
          const uint32_t loop_target_ms = (uint32_t) (${oq_heat_loop_curve_s} * 1000UL);
          if (id(oq_curve_request_last_loop_ms) > 0 && now_ms > id(oq_curve_request_last_loop_ms)) {
            const uint32_t elapsed_ms = now_ms - id(oq_curve_request_last_loop_ms);
            if (elapsed_ms < loop_target_ms) return;
          }
          id(oq_curve_request_last_loop_ms) = now_ms;

          constexpr int min_level = 0;
          constexpr int max_level = 10;
          const int demand_max_f = (int) ${oq_strategy_demand_max_f};
          int raw = id(oq_demand_raw);
          raw = std::max(0, std::min(demand_max_f, raw));

          id(oq_demand_filtered_prev) = id(oq_demand_filtered);
          id(oq_demand_filtered) = raw;
          id(oq_heating_demand_filtered) = raw;

          int f = raw;
          int f_cap = id(oq_power_cap_f);
          f_cap = std::max(0, std::min(demand_max_f, f_cap));
          if (f > f_cap) f = f_cap;

          #if OQ_TOPOLOGY_DUO
          const bool lead_is_hp1 = (id(hp1_minutes) <= id(${curve_secondary_minutes_id}));
          #else
          const bool lead_is_hp1 = true;
          #endif
          const int lead_code = lead_is_hp1 ? 1 : 2;
          if (id(oq_last_lead_hp) != lead_code) id(oq_last_lead_hp) = lead_code;

          auto excluded_levels = [&](bool is_hp1)->oq_request::ExcludedLevels {
            if (is_hp1) {
              return oq_request::ExcludedLevels{
                  id(hp1_excluded_level_a).has_state()
                      ? id(hp1_excluded_level_a).current_option()
                      : std::string("None"),
                  id(hp1_excluded_level_b).has_state()
                      ? id(hp1_excluded_level_b).current_option()
                      : std::string("None"),
              };
            }
            #if OQ_TOPOLOGY_DUO
            return oq_request::ExcludedLevels{
                id(${curve_secondary_excluded_level_a_id}).has_state()
                    ? id(${curve_secondary_excluded_level_a_id}).current_option()
                    : std::string("None"),
                id(${curve_secondary_excluded_level_b_id}).has_state()
                    ? id(${curve_secondary_excluded_level_b_id}).current_option()
                    : std::string("None"),
            };
            #else
            (void) is_hp1;
            return oq_request::ExcludedLevels{"None", "None"};
            #endif
          };

          auto level_allowed = [&](bool is_hp1, int level)->bool {
            return oq_request::level_allowed_for_excluded_levels(excluded_levels(is_hp1), level);
          };

          auto valve_defrost_active = [&](bool is_hp1)->bool {
            if (is_hp1) return id(hp1_4_way_valve).state;
            #if OQ_TOPOLOGY_DUO
            return id(${curve_secondary_4_way_valve_id}).state;
            #else
            return false;
            #endif
          };

          int level_cap = (int) roundf(id(oq_day_max_level).state);
          if (id(oq_silent_active).state) level_cap = (int) roundf(id(oq_silent_max_level).state);
          if (level_cap < min_level) level_cap = min_level;
          if (level_cap > max_level) level_cap = max_level;

          const bool hp1_valve_def = valve_defrost_active(true);
          #if OQ_TOPOLOGY_DUO
          const bool hp2_valve_def = valve_defrost_active(false);
          #else
          const bool hp2_valve_def = false;
          #endif
          id(oq_P_hp_cap_w) = 0.0f;
          id(oq_P_deficit_w) = 0.0f;

          int owner = 0;
          int dispatch_hp1 = 0;
          int dispatch_hp2 = 0;
          float demand_continuous = id(oq_curve_demand_continuous);
          if (isnan(demand_continuous)) demand_continuous = (float) f;
          const float demand_u = oq_curve::normalized_demand_u(demand_continuous, demand_max_f);
          const float dispatch_u = oq_curve::normalized_demand_u((float) f, demand_max_f);
          #if OQ_TOPOLOGY_DUO
          const auto tuning = oq_curve::control_profile(
              id(oq_curve_control_profile).has_state()
                  ? id(oq_curve_control_profile).current_option()
                  : std::string());

          float temp_err_c = NAN;
          if (!isnan(id(oq_supply_target_temp).state) && !isnan(id(oq_system_supply_temp).state)) {
            temp_err_c = id(oq_supply_target_temp).state - id(oq_system_supply_temp).state;
          }
          const bool demand_active = (f > 0);
          const bool heat_phase = demand_active && (id(oq_curve_regime_code) == 1);
          const int prev_curve_post = id(oq_demand_filtered_prev);

          auto max_allowed_level_for_hp = [&](bool is_hp1)->int {
            int lvl_max = 0;
            for (int lvl = level_cap; lvl >= 1; lvl--) {
              if (level_allowed(is_hp1, lvl)) {
                lvl_max = lvl;
                break;
              }
            }
            return lvl_max;
          };

          auto level_power_w = [&](bool is_hp1, int level)->float {
            if (level <= 0) return 0.0f;
            if (!level_allowed(is_hp1, level)) return NAN;
            if (!id(outside_temp_selected).has_state() || isnan(id(outside_temp_selected).state)) return NAN;
            if (!id(oq_supply_target_temp).has_state() || isnan(id(oq_supply_target_temp).state)) return NAN;
            return oq_perf::interp_power_th_w(level, id(outside_temp_selected).state, id(oq_supply_target_temp).state);
          };

          const int prev1 = id(hp1_last_applied_level);
          const int prev2 = id(${curve_secondary_last_applied_level_id});

          auto build_candidate = [&](int hp1_level, int hp2_level, float target_power_w)->oq_curve::DispatchCandidate {
            float p1 = level_power_w(true, hp1_level);
            float p2 = level_power_w(false, hp2_level);
            if (isnan(p1) || isnan(p2)) return oq_curve::invalid_dispatch_candidate();
            const float power_w = p1 + p2;
            return oq_curve::DispatchCandidate{
              true,
              hp1_level,
              hp2_level,
              power_w,
              fabsf(power_w - target_power_w),
              (hp1_level > 0 ? 1 : 0) + (hp2_level > 0 ? 1 : 0),
              abs(hp1_level - hp2_level),
            };
          };

          const bool prev_hp1_on = (prev1 > 0);
          const bool prev_hp2_on = (prev2 > 0);
          const int single_owner = oq_curve::pick_single_owner(
              demand_active, id(oq_curve_single_owner_hp), prev_hp1_on, prev_hp2_on, lead_is_hp1);
          const int owner_max_single = (single_owner == 2)
              ? max_allowed_level_for_hp(false)
              : max_allowed_level_for_hp(true);
          const int hp1_max_single = max_allowed_level_for_hp(true);
          const int hp2_max_single = max_allowed_level_for_hp(false);

          const float owner_cap_w = (single_owner == 2)
              ? level_power_w(false, owner_max_single)
              : level_power_w(true, owner_max_single);

          float duo_cap_w = 0.0f;
          for (int hp1_level = 1; hp1_level <= hp1_max_single; hp1_level++) {
            for (int hp2_level = 1; hp2_level <= hp2_max_single; hp2_level++) {
              if (abs(hp1_level - hp2_level) > 1) continue;
              const auto candidate = build_candidate(hp1_level, hp2_level, 0.0f);
              if (!candidate.valid) continue;
              if (candidate.power_w > duo_cap_w) duo_cap_w = candidate.power_w;
            }
          }

          const bool demand_rundown = (f < prev_curve_post);
          const float target_power_w =
              demand_active ? oq_curve::phase_target_power_w(heat_phase, demand_u, dispatch_u, owner_cap_w, duo_cap_w) : 0.0f;

          oq_curve::DispatchCandidate best_single = oq_curve::invalid_dispatch_candidate();
          if (demand_active && single_owner == 1) {
            for (int hp1_level = 1; hp1_level <= hp1_max_single; hp1_level++) {
              const auto candidate = build_candidate(hp1_level, 0, target_power_w);
              if (oq_curve::better_dispatch_candidate(candidate, best_single, prev1, prev2)) best_single = candidate;
            }
          } else if (demand_active && single_owner == 2) {
            for (int hp2_level = 1; hp2_level <= hp2_max_single; hp2_level++) {
              const auto candidate = build_candidate(0, hp2_level, target_power_w);
              if (oq_curve::better_dispatch_candidate(candidate, best_single, prev1, prev2)) best_single = candidate;
            }
          }

          oq_curve::DispatchCandidate best_duo = oq_curve::invalid_dispatch_candidate();
          if (demand_active) {
            for (int hp1_level = 1; hp1_level <= hp1_max_single; hp1_level++) {
              for (int hp2_level = 1; hp2_level <= hp2_max_single; hp2_level++) {
                if (abs(hp1_level - hp2_level) > 1) continue;
                const auto candidate = build_candidate(hp1_level, hp2_level, target_power_w);
                if (oq_curve::better_dispatch_candidate(candidate, best_duo, prev1, prev2)) best_duo = candidate;
              }
            }
          }

          const int dual_on_hold_min = std::max(1, (int) roundf(id(oq_dual_hp_enable_hold_min).state));
          const int dual_off_hold_min = std::max(1, (int) roundf(id(oq_dual_hp_disable_hold_min).state));
          const float dt_min = ((float) loop_target_ms / 1000.0f) / 60.0f;
          const uint32_t lead_last_start_ms =
              lead_is_hp1 ? id(hp1_last_start_ms) : id(${curve_secondary_last_start_ms_id});
          const bool startup_grace_active =
              (tuning.dual_startup_grace_s > 0) &&
              (lead_last_start_ms > 0) &&
              (now_ms > lead_last_start_ms) &&
              ((now_ms - lead_last_start_ms) < ((uint32_t) tuning.dual_startup_grace_s * 1000UL));
          const float duo_enable_margin_w = heat_phase ? 700.0f : 450.0f;
          const float duo_disable_margin_w = 250.0f;
          const float duo_enable_min_u = heat_phase ? 0.90f : 0.80f;
          const float duo_disable_max_u = heat_phase ? 0.70f : 0.55f;
          const bool single_saturated =
              best_single.valid &&
              ((best_single.hp1_level >= std::max(6, hp1_max_single - 1)) ||
               (best_single.hp2_level >= std::max(6, hp2_max_single - 1)));
          const bool duo_clearly_better =
              best_duo.valid && best_single.valid &&
              (best_duo.error_w + duo_enable_margin_w < best_single.error_w);
          const bool single_good_enough =
              best_single.valid &&
              (!best_duo.valid || (best_single.error_w <= (best_duo.error_w + duo_disable_margin_w)));
          const bool force_dual_defrost = demand_active && hp1_valve_def && hp2_valve_def;
          const bool emergency_dual_condition =
              demand_active && best_duo.valid && heat_phase &&
              !startup_grace_active &&
              !demand_rundown &&
              single_saturated &&
              duo_clearly_better &&
              !isnan(temp_err_c) &&
              (temp_err_c >= tuning.dual_emergency_temp_err_c) &&
              (dispatch_u >= 0.95f);

          if (emergency_dual_condition) {
            id(oq_dual_hp_emergency_hold_elapsed_accum_min) += dt_min;
          } else {
            id(oq_dual_hp_emergency_hold_elapsed_accum_min) = 0.0f;
          }
          const bool force_dual_capacity =
              id(oq_dual_hp_emergency_hold_elapsed_accum_min) >= (float) std::max(1, tuning.dual_emergency_hold_min);

          const bool dual_on_condition =
              demand_active &&
              best_duo.valid &&
              !startup_grace_active &&
              !demand_rundown &&
              (force_dual_capacity || force_dual_defrost ||
               (duo_clearly_better &&
                (dispatch_u >= duo_enable_min_u) &&
                (heat_phase ? single_saturated : !single_good_enough) &&
                (isnan(temp_err_c) || temp_err_c >= -0.05f)));
          const bool dual_off_condition =
              (!demand_active) ||
              (!best_duo.valid) ||
              (!id(oq_dual_hp_enabled) && !dual_on_condition) ||
              (single_good_enough &&
               (dispatch_u <= duo_disable_max_u) &&
               (isnan(temp_err_c) || temp_err_c <= tuning.dual_disable_temp_err_max_c));

          if (!demand_active) {
            oq_request::reset_dual_hold_state(
                id(oq_dual_hp_enabled),
                id(oq_dual_hp_enable_hold_elapsed_accum_min),
                id(oq_dual_hp_disable_hold_elapsed_accum_min),
                id(oq_dual_hp_emergency_hold_elapsed_accum_min));
          } else {
            if (dual_on_condition) id(oq_dual_hp_enable_hold_elapsed_accum_min) += dt_min;
            else id(oq_dual_hp_enable_hold_elapsed_accum_min) = 0.0f;

            if (dual_off_condition) id(oq_dual_hp_disable_hold_elapsed_accum_min) += dt_min;
            else id(oq_dual_hp_disable_hold_elapsed_accum_min) = 0.0f;

            if (!id(oq_dual_hp_enabled) &&
                id(oq_dual_hp_enable_hold_elapsed_accum_min) >= (float) dual_on_hold_min) {
              id(oq_dual_hp_enabled) = true;
              id(oq_dual_hp_disable_hold_elapsed_accum_min) = 0.0f;
            } else if (id(oq_dual_hp_enabled) &&
                       id(oq_dual_hp_disable_hold_elapsed_accum_min) >= (float) dual_off_hold_min) {
              id(oq_dual_hp_enabled) = false;
              id(oq_dual_hp_enable_hold_elapsed_accum_min) = 0.0f;
            }
          }

          const bool dual_enabled =
              demand_active && best_duo.valid &&
              (force_dual_capacity || force_dual_defrost || id(oq_dual_hp_enabled));

          if (!demand_active) {
            owner = 0;
            dispatch_hp1 = 0;
            dispatch_hp2 = 0;
            id(oq_curve_capacity_mode_code) = 0;
          } else if (dual_enabled) {
            id(oq_curve_single_owner_hp) = 0;
            owner = 0;
            dispatch_hp1 = best_duo.hp1_level;
            dispatch_hp2 = best_duo.hp2_level;
            id(oq_curve_capacity_mode_code) = 2;
          } else {
            id(oq_curve_single_owner_hp) = single_owner;
            owner = single_owner;
            dispatch_hp1 = best_single.valid ? best_single.hp1_level : 0;
            dispatch_hp2 = best_single.valid ? best_single.hp2_level : 0;
            id(oq_curve_capacity_mode_code) = (best_single.valid && (dispatch_hp1 > 0 || dispatch_hp2 > 0)) ? 1 : 0;
          }
          #else
          oq_request::reset_dual_runtime_state(
              id(oq_dual_hp_enabled),
              id(oq_dual_hp_enable_hold_elapsed_accum_min),
              id(oq_dual_hp_disable_hold_elapsed_accum_min),
              id(oq_dual_hp_emergency_hold_elapsed_accum_min),
              id(oq_curve_single_owner_hp),
              id(oq_duo_request_hold_until_ms),
              1);
          owner = (demand_u > 0.0f) ? 1 : 0;
          dispatch_hp1 = std::max(0, std::min(max_level, (int) lroundf(demand_u * (float) max_level)));
          dispatch_hp2 = 0;
          id(oq_curve_capacity_mode_code) = (dispatch_hp1 > 0) ? 1 : 0;
          #endif

          id(oq_curve_request_total_level) = dispatch_hp1 + dispatch_hp2;
          id(oq_curve_request_owner_hp) = owner;
          id(oq_curve_dispatch_hp1_level) = dispatch_hp1;
          id(oq_curve_dispatch_hp2_level) = dispatch_hp2;
