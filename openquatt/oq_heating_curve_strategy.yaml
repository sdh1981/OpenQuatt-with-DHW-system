# ==============================================================================
# OpenQuatt - Heating Curve Strategy
# ==============================================================================
#
# Goal:
#   Owns the complete heating-curve strategy and its compressor-request output.
#
# Ownership:
#   - Computes curve supply target generation and PID demand
#   - Owns curve-specific hysteresis, phase/regime state, and diagnostics
#   - Decides curve per-HP dispatch and capacity mode
#   - Clears Power House-specific capacity/deficit telemetry while curve mode is active
#   - Publishes curve request outputs for oq_thermal_request_control to finish
#     into the shared request interface
# ==============================================================================

globals:
  # Continuous PID-derived demand before integer quantization or request guardrails.
  - id: oq_curve_demand_continuous
    type: float
    restore_value: false
    initial_value: 'NAN'

  # Internal source (0..20) for heating-curve mode (PID -> demand)
  - id: oq_demand_curve
    type: int
    restore_value: false
    initial_value: '0'

  # Heating-curve diagnostics: demand before output guardrails.
  - id: oq_curve_demand_pre_guardrail
    type: int
    restore_value: false
    initial_value: '0'

  # Curve operating regime: 0=OFF, 1=RECOVERY, 2=MAINTAIN.
  - id: oq_curve_regime_code
    type: int
    restore_value: false
    initial_value: '0'

  # Curve-mode on/off hysteresis state near zero-demand edge.
  - id: oq_curve_heat_request_active
    type: bool
    restore_value: false
    initial_value: 'false'

  # Timestamp when curve stop condition was first armed (OFF confirm guardrail).
  - id: oq_curve_stop_arm_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # Timestamp when curve phase entered OFF (for restart inhibit timing).
  - id: oq_curve_off_since_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # Diagnostic flag: restart from OFF is temporarily inhibited.
  - id: oq_curve_restart_inhibit_active
    type: bool
    restore_value: false
    initial_value: 'false'

  # Curve outside-temperature EMA state.
  - id: oq_curve_outside_ema_c
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: oq_curve_outside_ema_initialized
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: oq_curve_outside_ema_last_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: oq_curve_request_last_loop_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: oq_curve_request_total_level
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_curve_request_owner_hp
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_curve_dispatch_hp1_level
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_curve_dispatch_hp2_level
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_curve_capacity_mode_code
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_curve_oil_return_hold_until_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

select:
  - platform: template
    id: oq_curve_control_profile
    name: "Heating Curve Control Profile"
    icon: mdi:tune-variant
    optimistic: true
    restore_value: true
    options:
      - Comfort
      - Balanced
      - Stable
    initial_option: Balanced
    entity_category: config
    web_server:
      sorting_group_id: oq_heating_curve
    on_value:
      then:
        - climate.pid.reset_integral_term: oq_heating_curve_pid
        - lambda: |-
            // Reset curve runtime state so a profile switch starts from a clean baseline.
            oq_curve::reset_control_state(
              id(oq_curve_demand_continuous),
              id(oq_demand_curve),
              id(oq_curve_demand_pre_guardrail),
              id(oq_curve_heat_request_active),
              id(oq_curve_stop_arm_ms),
              id(oq_curve_off_since_ms),
              id(oq_curve_restart_inhibit_active),
              id(oq_curve_regime_code));
            id(oq_curve_oil_return_hold_until_ms) = 0;
            oq_curve::reset_outside_ema_state(
              id(oq_curve_outside_ema_c),
              id(oq_curve_outside_ema_initialized),
              id(oq_curve_outside_ema_last_ms));
            oq_curve::reset_request_state(
              id(oq_curve_request_last_loop_ms),
              id(oq_curve_request_total_level),
              id(oq_curve_request_owner_hp),
              id(oq_curve_dispatch_hp1_level),
              id(oq_curve_dispatch_hp2_level),
              id(oq_curve_capacity_mode_code));
            oq_request::reset_dual_runtime_state(
              id(oq_dual_hp_enabled),
              id(oq_dual_hp_enable_hold_elapsed_accum_min),
              id(oq_dual_hp_disable_hold_elapsed_accum_min),
              id(oq_dual_hp_emergency_hold_elapsed_accum_min),
              id(oq_curve_single_owner_hp),
              id(oq_duo_request_hold_until_ms),
              0);

