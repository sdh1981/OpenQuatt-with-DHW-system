        icon: mdi:snowflake-check
        availability: >-
          {% set selector = states('input_text.openquatt_source_cooling_enable') | trim %}
          {% set parts = selector.split('|', 1) %}
          {% set entity = parts[0] | trim if (parts | length > 0) else '' %}
          {% set attr_name = parts[1] | trim if (parts | length > 1) else '' %}
          {% set raw = state_attr(entity, attr_name) if entity and attr_name else (states(entity) if entity else none) %}
          {% set ns = namespace(value=none) %}
          {% if raw is sameas true or raw is sameas false %}
            {% set ns.value = raw %}
          {% elif raw is number %}
            {% set ns.value = (raw | float(0)) > 0 %}
          {% elif raw is string %}
            {% set text = raw | trim | lower %}
            {% if text in ['on', 'true', '1', 'cool', 'cooling', 'heat_cool', 'enabled'] %}
              {% set ns.value = true %}
            {% elif text in ['off', 'false', '0', 'heat', 'idle', 'disabled'] %}
              {% set ns.value = false %}
            {% endif %}
          {% endif %}
          {{ ns.value is not none }}
        state: >-
          {% set selector = states('input_text.openquatt_source_cooling_enable') | trim %}
          {% set parts = selector.split('|', 1) %}
          {% set entity = parts[0] | trim if (parts | length > 0) else '' %}
          {% set attr_name = parts[1] | trim if (parts | length > 1) else '' %}
          {% set raw = state_attr(entity, attr_name) if entity and attr_name else (states(entity) if entity else none) %}
          {% set ns = namespace(value=false) %}
          {% if raw is sameas true or raw is sameas false %}
            {% set ns.value = raw %}
          {% elif raw is number %}
            {% set ns.value = (raw | float(0)) > 0 %}
          {% elif raw is string %}
            {% set text = raw | trim | lower %}
