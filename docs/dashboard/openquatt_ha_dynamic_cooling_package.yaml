        seconds: "/15"
    sensor:
      - name: OpenQuatt Ext Cooling Room Count
        unique_id: openquatt_ext_cooling_room_count
        icon: mdi:counter
        state: "{{ states('input_number.openquatt_cooling_room_count') | float(0) | round(0) }}"

