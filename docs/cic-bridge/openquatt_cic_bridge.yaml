modbus_controller:
  - id: hp1_server
    address: 1
    modbus_id: modbus1
    setup_priority: -100
    update_interval: never
    server_courtesy_response:
      enabled: true
      register_last_address: 5000
      register_value: 0
    server_registers:
      - address: 1999
        value_type: U_WORD
        read_lambda: |-
          if (id(hp1_set_compressor_level_ha).state.empty()) return 0;
          return static_cast<uint16_t>(atoi(id(hp1_set_compressor_level_ha).state.c_str()));
        write_lambda: |-
          ESP_LOGI("modbus_server", "HP1 R1999 compressor level <- %u", x);
          return true;
      - address: 2006
        value_type: U_WORD
        read_lambda: |-
          return id(hp1_silent_mode_ha).state == "On" ? 1 : 0;
        write_lambda: |-
          ESP_LOGI("modbus_server", "HP1 R2006 silent mode <- %u", x);
          return true;
      - address: 2010
        value_type: U_WORD
        read_lambda: |-
          return id(hp1_set_pump_mode_ha).state == "On" ? 4096 : 0;
        write_lambda: |-
          ESP_LOGI("modbus_server", "HP1 R2010 pump mode <- %u", x);
          return true;
      - address: 2015
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_set_pump_speed_ha).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v));
        write_lambda: |-
          ESP_LOGI("modbus_server", "HP1 R2015 pump level <- %u", x);
          return true;
      - address: 3999
        value_type: U_WORD
        read_lambda: |-
          if (id(hp1_set_working_mode_ha).state == "Cooling") return 1;
          if (id(hp1_set_working_mode_ha).state == "Heating") return 2;
          return 0;
        write_lambda: |-
          ESP_LOGI("modbus_server", "HP1 R3999 working mode <- %u", x);
          return true;
      - address: 2099
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2099).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v));
      - address: 2100
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2100).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v));
      - address: 2101
        value_type: U_WORD
        read_lambda: |-
          const float v = id(hp1_r2101).state;
          return isnan(v) ? 0 : static_cast<uint16_t>(lroundf(v * 10.0f));
      - address: 2102
        value_type: U_WORD
