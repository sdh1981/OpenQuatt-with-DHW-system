substitutions:
  device_name: openquatt-cic-bridge
  friendly_name: OpenQuatt CiC Bridge
  ha_entity_prefix: openquatt

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  reboot_timeout: 0s
  fast_connect: true
  power_save_mode: high
  min_auth_mode: wpa2

api:

ota:
  - platform: esphome

logger:
  level: WARN
  baud_rate: 0

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2026.4.0
  name_add_mac_suffix: false
  on_boot:
    priority: -100
    then:
      - logger.log: "OpenQuatt CiC Bridge gestart in dual Modbus bridge mode"

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 8MB
  variant: esp32s3
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_BT_ENABLED: n

uart:
  - id: mod_bus
    tx_pin: GPIO6
    rx_pin: GPIO5
    baud_rate: 19200
    data_bits: 8
    stop_bits: 1
    parity: EVEN
    rx_full_threshold: 1
    rx_timeout: 1
    debug:
      direction: BOTH

modbus:
  - uart_id: mod_bus
    id: modbus1
    role: server
    send_wait_time: 50ms

