name: Dev Build

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dev-release
  cancel-in-progress: true

jobs:
  compile-profiles:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - id: duo-waveshare
            config: openquatt_duo_waveshare.yaml
            build_path: .esphome/build/openquatt_duo_waveshare
            dev_manifest_name: openquatt-duo-ota.manifest.json
          - id: duo-heatpump-listener
            config: openquatt_duo_heatpump_listener.yaml
            build_path: .esphome/build/openquatt_duo_heatpump_listener
            dev_manifest_name: openquatt-duo-ota.manifest.json
          - id: single-waveshare
            config: openquatt_single_waveshare.yaml
            build_path: .esphome/build/openquatt_single_waveshare
            dev_manifest_name: openquatt-single-ota.manifest.json
          - id: single-heatpump-listener
            config: openquatt_single_heatpump_listener.yaml
            build_path: .esphome/build/openquatt_single_heatpump_listener
            dev_manifest_name: openquatt-single-ota.manifest.json

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/requirements-esphome.txt

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('.github/requirements-esphome.txt') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install ESPHome
        run: |
          ESPHOME_VERSION="$(cat .github/requirements-esphome.txt | sed 's/^esphome==//')"
          pip install --upgrade "esphome==${ESPHOME_VERSION}"
          esphome version

      - name: Compute dev version
        id: dev_meta
        run: |
          BASE_VERSION="$(awk -F'\"' '/^project_version: / { print $2 }' openquatt/oq_substitutions_common.yaml)"
          SHORT_SHA="${GITHUB_SHA::7}"
          DEV_VERSION="${BASE_VERSION}-dev.${GITHUB_RUN_NUMBER}+${SHORT_SHA}"
          echo "version=${DEV_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate config
        run: |
          DEV_MANIFEST_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/dev-latest/${{ matrix.profile.dev_manifest_name }}"
          esphome \
            -s project_version "${{ steps.dev_meta.outputs.version }}" \
            -s release_channel dev \
            -s release_manifest_url "${DEV_MANIFEST_URL}" \
            config "${{ matrix.profile.config }}"

      - name: Compile firmware
        run: |
          DEV_MANIFEST_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/dev-latest/${{ matrix.profile.dev_manifest_name }}"
          esphome \
            -s project_version "${{ steps.dev_meta.outputs.version }}" \
            -s release_channel dev \
            -s release_manifest_url "${DEV_MANIFEST_URL}" \
            compile "${{ matrix.profile.config }}"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        with:
          name: openquatt-${{ matrix.profile.id }}-dev-release
          if-no-files-found: error
          path: |
            ${{ matrix.profile.build_path }}/.pioenvs/openquatt/firmware.ota.bin
            ${{ matrix.profile.build_path }}/.pioenvs/openquatt/firmware.factory.bin

  publish-dev-release:
    runs-on: ubuntu-latest
    needs: compile-profiles

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute dev version
        id: dev_meta
        run: |
          BASE_VERSION="$(awk -F'\"' '/^project_version: / { print $2 }' openquatt/oq_substitutions_common.yaml)"
          SHORT_SHA="${GITHUB_SHA::7}"
          DEV_VERSION="${BASE_VERSION}-dev.${GITHUB_RUN_NUMBER}+${SHORT_SHA}"
          echo "version=${DEV_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download Duo Waveshare artifacts
        uses: actions/download-artifact@v7
        with:
          name: openquatt-duo-waveshare-dev-release
          path: dist/openquatt-duo-waveshare

      - name: Download Duo Heatpump Listener artifacts
        uses: actions/download-artifact@v7
        with:
          name: openquatt-duo-heatpump-listener-dev-release
          path: dist/openquatt-duo-heatpump-listener

      - name: Download Single Waveshare artifacts
        uses: actions/download-artifact@v7
        with:
          name: openquatt-single-waveshare-dev-release
          path: dist/openquatt-single-waveshare

      - name: Download Single Heatpump Listener artifacts
        uses: actions/download-artifact@v7
        with:
          name: openquatt-single-heatpump-listener-dev-release
          path: dist/openquatt-single-heatpump-listener

      - name: Prepare dev release assets and manifests
        run: |
          TAG="dev-latest"
          REPO="${GITHUB_REPOSITORY}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"
          ./scripts/prepare_release_assets.sh "${{ steps.dev_meta.outputs.version }}" "${BASE_URL}" "${RELEASE_URL}"

      - name: Move dev release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa dev-latest -m "Development channel" "${GITHUB_SHA}"
          git push origin refs/tags/dev-latest --force

      - name: Create or update dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$(cat <<EOF
          Mutable development-channel release for the \`dev\` branch.

          Commit: \`${GITHUB_SHA}\`
          Version: \`${{ steps.dev_meta.outputs.version }}\`
          EOF
          )

          if gh release view dev-latest >/dev/null 2>&1; then
            gh release edit dev-latest \
              --title "Development Channel" \
              --notes "$NOTES" \
              --prerelease
          else
            gh release create dev-latest \
              --title "Development Channel" \
              --notes "$NOTES" \
              --prerelease
          fi

      - name: Upload dev release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload dev-latest \
            openquatt-duo-ota.manifest.json \
            openquatt-single-ota.manifest.json \
            dist/openquatt-duo-waveshare.firmware.ota.bin \
            dist/openquatt-duo-waveshare.firmware.factory.bin \
            dist/openquatt-duo-heatpump-listener.firmware.ota.bin \
            dist/openquatt-duo-heatpump-listener.firmware.factory.bin \
            dist/openquatt-single-waveshare.firmware.ota.bin \
            dist/openquatt-single-waveshare.firmware.factory.bin \
            dist/openquatt-single-heatpump-listener.firmware.ota.bin \
            dist/openquatt-single-heatpump-listener.firmware.factory.bin \
            --clobber
