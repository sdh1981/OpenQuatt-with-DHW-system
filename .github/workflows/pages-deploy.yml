name: Pages Deploy

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - "scripts/dev.py"
      - "scripts/build_pages_docs.py"
      - "scripts/prepare_pages_site.sh"
      - ".github/workflows/pages-deploy.yml"
  release:
    types: [published]
  workflow_run:
    workflows: ["Release Build"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-pages:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout site source
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Download latest stable factory binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .tmp/pages-firmware
          gh release download \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "*.firmware.factory.bin" \
            --dir .tmp/pages-firmware \
            --clobber

      - name: Capture latest stable release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName --jq .tagName)"
          RELEASE_URL="$(gh release view --repo "${GITHUB_REPOSITORY}" --json url --jq .url)"
          mkdir -p .tmp/pages-metadata
          cat > .tmp/pages-metadata/version.json <<EOF
          {
            "version": "${VERSION}",
            "release_url": "${RELEASE_URL}"
          }
          EOF

      - name: Assemble Pages site
        run: python3 scripts/dev.py prepare-pages-site site .tmp/pages-firmware

      - name: Add mirrored release metadata
        run: install -m 0644 .tmp/pages-metadata/version.json site/firmware/main/version.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-pages

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
