substitutions:
  device_name: ot-test-esp32s3
  friendly_name: OT Test ESP32-S3
  esp_board: esp32-s3-devkitc-1
  esp_flash_size: 4MB
  esp_variant: esp32s3
  ot_in_pin: GPIO12
  ot_out_pin: GPIO13

# Minimal standalone OT validation config.
# Intended to verify the OT external component on ESP32-S3 with ESP-IDF/RMT,
# without pulling in the full OpenQuatt package stack.
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2026.4.0
  build_path: build/ot_test_esp32s3

esp32:
  board: ${esp_board}
  flash_size: ${esp_flash_size}
  variant: ${esp_variant}
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_BT_ENABLED: n

logger:

api:

ota:
  - platform: esphome

wifi:
  ap:
    ssid: "OpenQuatt OT Fallback"
    password: "openquatt"

captive_portal:

external_components:
  - source:
      type: local
      path: components
    components: [openquatt_ot_slave]

openquatt_ot_slave:
  id: oq_ot_slave_hub
  pin_thermostat_in: ${ot_in_pin}
  pin_thermostat_out: ${ot_out_pin}
  enabled: true
  response_enabled: true
  ch_enable: true
  cooling_enable: false

switch:
  - platform: openquatt_ot_slave
    openquatt_ot_slave_id: oq_ot_slave_hub
    enabled:
      id: oq_ot_slave_enabled
      name: "OpenTherm Enabled"
      entity_category: config
      icon: mdi:thermostat-cog

binary_sensor:
  - platform: openquatt_ot_slave
    openquatt_ot_slave_id: oq_ot_slave_hub
    master_ch_enable:
      id: ot_thermostat_ch_enable
      name: "OT - Thermostat CH Enable"
      icon: mdi:radiator
    master_cooling_enable:
      id: ot_thermostat_cooling_enable
      name: "OT - Thermostat Cooling Enable"
      icon: mdi:snowflake
    link_problem:
      id: ot_link_problem
      name: "OT - Link Problem"
      entity_category: diagnostic
      icon: mdi:alert-circle-outline

sensor:
  - platform: openquatt_ot_slave
    openquatt_ot_slave_id: oq_ot_slave_hub
    t_set:
      id: ot_thermostat_control_setpoint
      name: "OT - Control Setpoint"
      icon: mdi:thermostat
    t_roomset:
      id: ot_thermostat_room_setpoint
      name: "OT - Room Setpoint"
      icon: mdi:home-thermometer-outline
    t_room:
      id: ot_thermostat_room_temp
      name: "OT - Room Temperature"
      icon: mdi:home-thermometer
